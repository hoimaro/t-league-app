<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>音声入力テスト（辞書自動登録ツール）</title>
  
  <script>
    // GASのウェブアプリURLを設定してください（新しいデプロイのURL）
    const CONFIG_GAS_URL = "https://script.google.com/macros/s/AKfycbxApVeyJSrYaWtUDyttPUbUdvMgs3OknGQ5ZuLz9AhdJxrxa3S3KQsgQK1VUJ6z6kI/exec"; 
  </script>

  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
    #startBtn { 
      padding: 15px 30px; background: #ccc; color: white; border: none; 
      border-radius: 30px; font-size: 18px; margin-bottom: 10px; cursor: not-allowed;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 80%; max-width: 300px;
    }
    #status { color: #666; margin-bottom: 20px; font-size: 14px; font-weight: bold; }
    
    .box-title { font-size: 14px; font-weight: bold; margin-top: 15px; margin-bottom: 5px; color: #333; text-align: left; max-width: 300px; margin-left: auto; margin-right: auto; }
    
    /* 正式名称入力欄 (プルダウンに対応) */
    #officialInput {
      padding: 12px; font-size: 16px; width: 80%; max-width: 300px; 
      border: 2px solid #333; border-radius: 5px; margin-bottom: 10px;
      box-sizing: border-box; background-color: #fff; cursor: pointer;
    }

    /* 認識された元の言葉エリア（グレー） */
    #rawResult { 
      width: 90%; max-width: 300px; height: 60px; padding: 12px; 
      border: 1px solid #aaa; border-radius: 10px; font-size: 16px; 
      text-align: left; resize: none; margin: 0 auto; display: block;
      background: #e9ecef; color: #555; box-sizing: border-box;
    }
    
    /* 変換後の結果エリア（白） */
    #result { 
      width: 90%; max-width: 300px; height: 60px; padding: 12px; 
      border: 1px solid #ccc; border-radius: 10px; font-size: 16px; 
      text-align: left; resize: none; margin: 0 auto; display: block;
      box-sizing: border-box;
    }

    /* 手動登録ボタン */
    #manualRegBtn {
      margin-top: 15px; padding: 10px 20px; background: #6c757d; color: white;
      border: none; border-radius: 20px; font-size: 14px; cursor: pointer;
      width: 80%; max-width: 300px;
    }
  </style>
</head>
<body>
  <h2>音声入力テスト<br>（辞書自動登録ツール）</h2>
  
  <button id="startBtn" disabled>システムの準備中...</button>
  <div id="status">辞書データをダウンロードしています...</div>
  
  <div class="box-title">① 正式名称（スプレッドシートのB列用）</div>
  <select id="officialInput">
    <option value="" disabled selected>選択してください</option>
    <option value="リーチ">リーチ</option>
    <option value="ダブルリーチ">ダブルリーチ</option>
    <option value="リーチ,ツモ">リーチ,ツモ</option>    
    <option value="ツモ">ツモ</option>
    <option value="一発">一発</option>
    <option value="一発,ツモ">一発,ツモ</option>
    <option value="ロン">ロン</option>
    <option value="平和">平和</option>
    <option value="断么九">断么九</option>
    <option value="一盃口">一盃口</option>
    <option value="七対子">七対子</option>
    <option value="対々和">対々和</option>
    <option value="三暗刻">三暗刻</option>
    <option value="四暗刻">四暗刻</option>
    <option value="三色同順">三色同順</option>
    <option value="三色同刻">三色同刻</option>
    <option value="一気通貫">一気通貫</option>
    <option value="混全帯么九">混全帯么九</option>
    <option value="純全帯么九">純全帯么九</option>
    <option value="混一色">混一色</option>
    <option value="清一色">清一色</option>
    <option value="二盃口">二盃口</option>
    <option value="混老頭">混老頭</option>
    <option value="清老頭">清老頭</option>
    <option value="小三元">小三元</option>
    <option value="大三元">大三元</option>
    <option value="小四喜">小四喜</option>
    <option value="大四喜">大四喜</option>
    <option value="緑一色">緑一色</option>
    <option value="九蓮宝燈">九蓮宝燈</option>
    <option value="国士無双">国士無双</option>
    <option value="天和">天和</option>
    <option value="地和">地和</option>
    <option value="海底撈月,ツモ">海底撈月,ツモ</option>
    <option value="河底撈魚">河底撈魚</option>
    <option value="嶺上開花,ツモ">嶺上開花,ツモ</option>
    <option value="リーチ,断么九,平和">リーチ,断么九,平和</option>
    <option value="槍槓">槍槓</option>
    <option value="字一色">字一色</option>
    <option value="三槓子">三槓子</option>
    <option value="四槓子">四槓子</option>
    <option value="断么九,鳴きあり">断么九,鳴きあり</option>   
    <option value="鳴きあり">鳴きあり</option>
    <option value="ドラ">ドラ</option>
    <option value="ドラ2">ドラ2</option>
    <option value="ドラ3">ドラ3</option>
    <option value="ドラ4">ドラ4</option>
    <option value="ドラ5">ドラ5</option>
    <option value="ドラ6">ドラ6</option>
    <option value="ドラ7">ドラ7</option>
    <option value="ドラ8">ドラ8</option>
    <option value="ドラ9">ドラ9</option>
    <option value="ドラ10">ドラ10</option>
    <option value="役牌">役牌</option>
    <option value="役牌2">役牌2</option>
    <option value="役牌3">役牌3</option>
    <option value="役牌4">役牌4</option>
  </select>

  <div class="box-title">② 認識された元の言葉（スプレッドシートのA列用）</div>
  <textarea id="rawResult" readonly placeholder="喋り終わるとここに入り、自動登録されます"></textarea>

  <div class="box-title">▼ （参考）既存の辞書フィルター通過後</div>
  <textarea id="result" readonly placeholder="現在の辞書での変換結果"></textarea>

  <button id="manualRegBtn">※自動登録されなかった場合は手動登録</button>

  <script>
    const startBtn = document.getElementById('startBtn');
    const officialInput = document.getElementById('officialInput');
    const rawResultText = document.getElementById('rawResult');
    const resultText = document.getElementById('result');
    const statusText = document.getElementById('status');

    let dynamicDictionary = {};
    let sortedKeys = [];

// ▼ 今回書き換えるプレビュー用関数 ▼
    function applyDictionary(text) {
      // 実際のアプリ(index.html)と全く同じ抽出ロジックでプレビューする
      let normalizedText = text.replace(/[\s ]+/g, "");
      let extractedYaku = [];
      let remainingText = normalizedText;

      // 鳴きあり判定
      if (remainingText.includes("鳴きあり") || remainingText.includes("なきあり")) {
        extractedYaku.push("鳴きあり"); 
        remainingText = remainingText.replace(/鳴きあり|なきあり/g, "");
      }

      // 長い順にソートされた辞書でマッチング
      for (const key of sortedKeys) {
        if (remainingText.includes(key)) {
          let officialName = dynamicDictionary[key];
          if (officialName !== "除外") {
            // カンマ区切りの複数の役を展開してリストに追加
            let splitYaku = officialName.split(/[、，,\s]+/);
            extractedYaku.push(...splitYaku);
          }
          // 一度抽出した言葉は元のテキストから消去する（再変換バグ防止）
          remainingText = remainingText.replace(new RegExp(key, 'g'), "");
        }
      }

      // 抽出された役の重複を削除
      extractedYaku = [...new Set(extractedYaku)];

      // 辞書に無かった未知の言葉をあぶり出す
      let unknownParts = remainingText.replace(/[、，,\s]+/g, "").trim();
      if (unknownParts.length === 1 && /^[ぁ-んァ-ヶ]$/.test(unknownParts)) {
        unknownParts = "";
      }

      // 画面表示用に文字を組み立てる
      let resultStr = extractedYaku.join(", ");
      if (unknownParts.length > 0) {
        resultStr += `\n(⚠️未登録の言葉: ${unknownParts})`;
      }
      return resultStr || "（役が抽出されませんでした）";
    }
    

    // 最初に既存の辞書を読み込む
    async function loadDictionary() {
      try {
        const targetUrl = CONFIG_GAS_URL + "?action=getDictionary";
        const response = await fetch(targetUrl, { method: "GET" });
        const resultData = await response.json();

        if (resultData.result === "success") {
          dynamicDictionary = resultData.dictionary;
          sortedKeys = Object.keys(dynamicDictionary).sort((a, b) => b.length - a.length);
          
          startBtn.disabled = false;
          startBtn.textContent = "🎤 音声入力を開始";
          startBtn.style.background = "#007bff";
          startBtn.style.cursor = "pointer";
          statusText.textContent = "待機中... 正式名称を選択して喋ってください。";
          
          initializeSpeechRecognition();
        } else {
          statusText.textContent = "辞書の読み込みに失敗しました。";
          statusText.style.color = "red";
        }
      } catch (error) {
        statusText.textContent = "通信エラー: 辞書が取得できません。";
        statusText.style.color = "red";
      }
    }

    // スプレッドシートへデータを送信する共通関数
    async function sendToSpreadsheet(raw, official, isAuto) {
      const typeStr = isAuto ? "自動" : "手動";
      statusText.textContent = `【${typeStr}登録中】スプレッドシートに送信しています...`;
      statusText.style.color = "#007bff";

      try {
        const targetUrl = CONFIG_GAS_URL + "?action=addDictionary" 
          + "&rawText=" + encodeURIComponent(raw) 
          + "&officialText=" + encodeURIComponent(official);
          
        const response = await fetch(targetUrl, { method: "GET" });
        const resultData = await response.json();
        
        if (resultData.result === "success") {
          statusText.textContent = `【${typeStr}登録成功！】「${raw}」を登録しました。`;
          statusText.style.color = "#06C755";
          rawResultText.value = ""; // 次の入力のために「元の言葉」だけクリア
        } else {
          statusText.textContent = "登録エラー：書き込みに失敗しました。";
          statusText.style.color = "red";
        }
      } catch (error) {
        statusText.textContent = "通信失敗：スプレッドシートに登録できませんでした。";
        statusText.style.color = "red";
      }
    }

    function initializeSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return;

      const recognition = new SpeechRecognition();
      recognition.lang = 'ja-JP';
      recognition.interimResults = true; 
      recognition.continuous = false; 

      let isRecognizing = false;

      recognition.onstart = () => {
        isRecognizing = true;
        statusText.textContent = "録音中... 話してください";
        statusText.style.color = "red";
        startBtn.textContent = "⏹ 録音を停止";
        startBtn.style.background = "#dc3545";
      };

      recognition.onresult = (event) => {
        let transcript = '';
        for (let i = 0; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        rawResultText.value = transcript;
        resultText.value = applyDictionary(transcript);
      };

      // 音声認識が終了した瞬間に自動で動きます
      recognition.onend = async () => {
        isRecognizing = false;
        startBtn.textContent = "🎤 音声入力を開始";
        startBtn.style.background = "#007bff";

        const rawText = rawResultText.value.replace(/[\s ]+/g, "");
        const officialText = officialInput.value.replace(/[\s ]+/g, "");

        // 両方埋まっている場合のみ、完全自動でスプレッドシートに送信
        if (rawText && officialText) {
          await sendToSpreadsheet(rawText, officialText, true);
        } else if (rawText && !officialText) {
          statusText.textContent = "【警告】①正式名称が未選択のため、自動登録をスキップしました。";
          statusText.style.color = "orange";
        } else {
          statusText.textContent = "待機中...";
          statusText.style.color = "#666";
        }
      };

      startBtn.addEventListener('click', () => {
        if (isRecognizing) {
          recognition.stop();
        } else {
          rawResultText.value = ""; 
          resultText.value = ""; 
          recognition.start(); 
        }
      });
    }

    // 万が一自動送信されなかった場合の手動登録ボタン
    document.getElementById('manualRegBtn').addEventListener('click', async () => {
      const rawText = rawResultText.value.replace(/[\s ]+/g, "");
      const officialText = officialInput.value.replace(/[\s ]+/g, "");
      
      if (!officialText) { alert("正式名称を選択してください"); return; }
      if (!rawText) { alert("音声入力を先に行ってください"); return; }
      
      await sendToSpreadsheet(rawText, officialText, false);
    });

    window.onload = () => {
      loadDictionary();
    };
  </script>
</body>
</html>
