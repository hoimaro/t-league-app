    /* 全体・基本レイアウト */
    body { font-family: sans-serif; background: #f0f2f5; text-align: center; color: #333; margin: 0; padding: 20px; }

      margin: 10px auto; width: 90%; max-width: 340px; height: 120px; 
      background: #fff; color: #333; text-align: left; padding: 12px; 
      border-radius: 8px; border: 1px solid #ccc; overflow-y: auto; font-size: 14px;

    /* モダンなセレクトボックス ▼ */
    .select-group {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
      gap: 10px;
    }
    .select-label {
      font-weight: bold;
      color: #555;
      width: 45px; /* 縦のラインを綺麗に揃える */
      text-align: right;
    }
    .modern-select {
      appearance: none; /* デフォルトのダサい矢印を消す */
      -webkit-appearance: none;
      -moz-appearance: none;
      background-color: #fff;
      border: 1px solid #cbd5e1;
      border-radius: 8px; /* 丸みを持たせる */
      padding: 12px 40px 12px 16px;
      font-size: 15px;
      color: #333;

      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 16px;

    }

    .riichi-button {

      transform: translateY(2px);

    }

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// Firebaseの初期設定と受信設定
const firebaseConfig = {
  apiKey: "AIzaSyCMV8Q4byjVGLnusCcJ_uBV3GoFV317ylE",
  authDomain: "t-league-app-7bd80.firebaseapp.com",
  databaseURL: "https://t-league-app-7bd80-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "t-league-app-7bd80",
  storageBucket: "t-league-app-7bd80.firebasestorage.app",
  messagingSenderId: "224775754642",
  appId: "1:224775754642:web:7009404537845708f4e74b"
};
// Firebaseを起動
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentTableRef = null;

// Firebaseからのプッシュ通知を待ち受ける関数
function startRealtimeSync(tableId) {
  if (currentTableRef) {
    currentTableRef.off();
  }
  // 「tables/卓ID」という専用チャンネルに繋ぐ
  currentTableRef = db.ref("tables/" + tableId);

  // データが更新された瞬間、自動で画面を書き換える
  currentTableRef.on("value", (snapshot) => {
    const data = snapshot.val();
    if (data) {
      console.log("🔥Firebase受信:", data);
      setupMahjongTableUI(data, myUserId);
    }
  });
}

// アプリ起動時に最初に呼び出す関数（LIFF連動版）
const CONFIG_LIFF_ID = "2010600263-fW0rPubj"; 
let myUserId = new URLSearchParams(window.location.search).get('id') || new URLSearchParams(window.location.search).get('userId');

async function initApp() {
  // 1. URLパラメータ（?id=DUMMY_1 など）からID取得を試みる
  const urlParams = new URLSearchParams(window.location.search);
  // id と userId のどちらで指定されても取得できるように修正しています
  myUserId = urlParams.get('id') || urlParams.get('userId');

  // 2. URLにIDがなく、LIFF IDが設定されている場合はLINEからIDを自動取得
  if (!myUserId && CONFIG_LIFF_ID) {
    try {
      await liff.init({ liffId: CONFIG_LIFF_ID });
      
      // ログイン状態を判定する処理
      if (liff.isLoggedIn()) {
        // すでに連携済みなら、そのままIDを取得
        const profile = await liff.getProfile();
        myUserId = profile.userId;
      } else {
        // まだ連携していないなら、LINEの認証画面を呼び出す
        liff.login();
        return; 
      }
      
    } catch (err) {
      document.getElementById("lobbyStatus").innerHTML = "⚠️ LIFFエラー発生:<br>" + err.message;
      return;
    }
  }

  // 3. それでもIDがない場合は、以前保存したキャッシュから探す
  if (!myUserId) {
    myUserId = localStorage.getItem('myUserId');
  } else {
    // IDが取得できたら次回のためにスマホに記憶させておく
    localStorage.setItem('myUserId', myUserId);
  }
  
  // 4. 最終的にIDが全く取得できない場合の安全処理
  if (!myUserId) {
    document.getElementById("lobbyStatus").innerHTML = "⚠️ ユーザーIDが取得できません。<br>LINEから開き直すか、URLの末尾に ?id=DUMMY_1 などを付けてください。";
    loadHostInterface();
    return;
  }
  
  document.getElementById("lobbyStatus").textContent = "⏳ 参加中の卓を確認しています...";
  
  try {
    // 自分が参加している「進行中の卓」があるかGASに問い合わせ
    const res = await fetch(`${CONFIG_GAS_URL}?action=getMyTable&userId=${myUserId}`);
    const resData = await res.json();
    
    if (resData.result === "success") {
      // ➡️ 卓が見つかった！自動着席してメイン画面を表示
      setupMahjongTableUI(resData.tableData, myUserId);
      let currentTableId = resData.tableData.tableId || "T_LEAGUE_TABLE_1"; 
      startRealtimeSync(currentTableId);
    } else {
      // ➡️ 卓がなかった！ホスト用の卓作成画面をロード
      document.getElementById("lobbyStatus").textContent = "現在、進行中の卓はありません。";
      loadHostInterface();
    }
  } catch (e) {
    document.getElementById("lobbyStatus").innerHTML = "⚠️ 通信エラー発生:<br>";
  }
}

let currentTableData = null; // 卓のデータを一時保存しておく変数
let tenpaiStatus = {};

// メイン画面のUIをセットアップする関数
function setupMahjongTableUI(tableData, myUserId) {
  currentTableData = tableData;
  document.getElementById("lobbyView").style.display = "none";
  document.getElementById("mainGameView").style.display = "block";

  // ▼▼▼ 追加：現在の局数を取得（例: "東2局"） ▼▼▼
  const currentKyoku = tableData.kyoku || tableData.round || "東1局";
  // ▲▲▲ 追加ここまで ▲▲▲

  // 1. 各プレイヤー情報と風のデータをセット
  // ▼▼▼ 修正：getCurrentDisplayWindを使って、現在の局に合わせた「実際の風」をセットする ▼▼▼
  const players = [
    { id: tableData.eastId, name: tableData.eastName, score: tableData.eastScore, wind: getCurrentDisplayWind("東", currentKyoku) },
    { id: tableData.southId, name: tableData.southName, score: tableData.southScore, wind: getCurrentDisplayWind("南", currentKyoku) },
    { id: tableData.westId, name: tableData.westName, score: tableData.westScore, wind: getCurrentDisplayWind("西", currentKyoku) },
    { id: tableData.northId, name: tableData.northName, score: tableData.northScore, wind: getCurrentDisplayWind("北", currentKyoku) }
  ];
  // ▲▲▲ 修正ここまで ▲▲▲

  // 2. 自分の席を探す
  let myIndex = players.findIndex(p => p.id === myUserId);
  if (myIndex === -1) myIndex = 0; 

  // 3. まろさんのHTML（boxJibun, boxShimocha...）に直接マッピングする
  const uiMap = [
    { boxId: "boxJibun",   data: players[(myIndex) % 4] },
    { boxId: "boxShimocha", data: players[(myIndex + 1) % 4] },
    { boxId: "boxToimen",   data: players[(myIndex + 2) % 4] },
    { boxId: "boxKamicha",  data: players[(myIndex + 3) % 4] }
  ];

  // 4. HTMLへの書き込みと風バッジの追加
  uiMap.forEach(p => {
    let boxEl = document.getElementById(p.boxId);
    if (boxEl) {
      // p-name と p-score のクラスを持つ要素を探して書き換え
      let nameEl = boxEl.querySelector(".p-name");
      let scoreEl = boxEl.querySelector(".p-score");

      if (nameEl) nameEl.textContent = p.data.name;
      if (scoreEl) scoreEl.textContent = Number(p.data.score).toLocaleString();

      // 風バッジの追加
      let oldBadge = boxEl.querySelector(".wind-badge");
      if (oldBadge) oldBadge.remove();

      let badge = document.createElement("div");
      badge.className = "wind-badge";
      badge.textContent = p.data.wind;
      badge.style.position = "absolute";
      badge.style.top = "2px";
      badge.style.left = "4px";
      badge.style.fontSize = "12px";
      badge.style.color = "#FFD700";
      badge.style.fontWeight = "bold";
      badge.style.zIndex = "10";
      
      boxEl.appendChild(badge);
    }
  });

  // 5. 中央の局情報の更新（まろさんのHTMLのIDに修正）
  let uiKyoku = document.getElementById("uiKyoku");
  let uiHonba = document.getElementById("uiHonba");
  let uiKyotaku = document.getElementById("uiKyotaku");
  
  // ▼ データのキー名が違う場合や、空欄だった場合の保険として「東1局」を用意しておく
  if (uiKyoku) uiKyoku.textContent = tableData.kyoku || tableData.round || "東1局";
  if (uiHonba) uiHonba.textContent = tableData.honba + "本場";
  if (uiKyotaku) uiKyotaku.textContent = "供託: " + tableData.kyotaku;

  // 6. デバッグ用のID表示
  let debugIdEl = document.getElementById("debugUserIdView");
  if (!debugIdEl) {
    debugIdEl = document.createElement("div");
    debugIdEl.id = "debugUserIdView";
    debugIdEl.style.textAlign = "center";

// 1. 辞書データの読み込み（爆速キャッシュ機能付き）
async function loadDictionary() {
  const micBtn = document.getElementById('micBtn');
  
  // ▼ステップ1：スマホ内に保存された前回の辞書（キャッシュ）があれば、即座に読み込む
  const cachedDict = localStorage.getItem('mahjongDictionary');
  if (cachedDict) {
    dictionary = JSON.parse(cachedDict);
    if(micBtn) {
      micBtn.disabled = false;
      micBtn.textContent = "🎤 アガリ役を音声入力";
    }
    log("保存された辞書を読み込みました（高速起動）。裏で最新版を同期します...");
    initSpeechRecognition(); // すぐに使えるようにする
  }

  // ▼ステップ2：裏でGASと通信し、最新の辞書データをダウンロードする
  try {
    const response = await fetch(CONFIG_GAS_URL + "?action=getDictionary");
    const resultData = await response.json();

    if (resultData.result === "success") {
      dictionary = resultData.dictionary;
      // 最新の辞書をスマホ（ブラウザ）に保存する
      localStorage.setItem('mahjongDictionary', JSON.stringify(dictionary));
      
      if (!cachedDict) {
        // 初回起動時（キャッシュが無い時）は、ここでボタンを有効化する
        if(micBtn) {
          micBtn.disabled = false;
          micBtn.textContent = "🎤 アガリ役を音声入力";
        }
        log("初回辞書の読み込みが完了しました。");
        initSpeechRecognition();
      } else {
        log("最新の辞書データの同期が完了しました。");
      }
    } else {
      if (!cachedDict) log(`<span style="color:red;">【エラー】GASからエラーが返されました。</span>`);
    }
  } catch (error) {
    if (!cachedDict) {
      log(`<span style="color:red;">【通信エラー】辞書が取得できません。</span>`);
      if(micBtn) micBtn.textContent = "通信エラー";
    } else {
      log("<span style='color:orange;'>最新辞書の同期に失敗しましたが、保存された辞書で動作します。</span>");
    }
  }
}

// 2. 音声認識の初期化
function initSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return;

  const recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = false; 

  const micBtn = document.getElementById('micBtn');
  if(!micBtn) return;

  recognition.onstart = () => {
    micBtn.textContent = "⏹ 録音中...";
    micBtn.style.background = "#dc3545"; 
  };

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    processSpeech(transcript);
  };

  recognition.onend = () => {
    micBtn.textContent = "🎤 アガリ役を音声入力";
    micBtn.style.background = "#007bff";
  };

  micBtn.addEventListener('click', () => {
    recognition.start(); 
  });
}

// 3. テキストからの役抽出・変換・鳴きあり処理
function processSpeech(text) {
  let normalizedText = text.replace(/[\s ]+/g, "");
  log(`[音声認識(補正後)]: ${normalizedText}`);

  let extractedYaku = [];
  let isKuiseagari = false;
  let remainingText = normalizedText;

  if (remainingText.includes("鳴きあり") || remainingText.includes("なきあり")) {
    isKuiseagari = true;
    remainingText = remainingText.replace(/鳴きあり|なきあり/g, "");
  }

  const sortedKeys = Object.keys(dictionary).sort((a, b) => b.length - a.length);

  for (const key of sortedKeys) {
    if (remainingText.includes(key)) {
      let officialName = dictionary[key];
      if (officialName !== "除外") {
        let splitYaku = officialName.split(/[、，,\s]+/);
        extractedYaku.push(...splitYaku);
      }
      remainingText = remainingText.replace(new RegExp(key, 'g'), "");
    }
  }

  if (extractedYaku.includes("鳴きあり")) {
    isKuiseagari = true;
    extractedYaku = extractedYaku.filter(yaku => yaku !== "鳴きあり");
  }

  let unknownParts = remainingText.replace(/[、，,\s]+/g, "").trim();
  if (unknownParts.length === 1 && /^[ぁ-んァ-ヶ]$/.test(unknownParts)) unknownParts = "";
  
  if (unknownParts.length > 0) {
    log(`<span style="color:red;">【警告】未登録の言葉が含まれています: 「${unknownParts}」</span>`);
  }

  // ▼ 学習ロジック ▼
  if (isAddingMode) {
    // 【条件】未登録語句があり、かつ「今回の追加で抽出された役がちょうど1つ」である時のみ学習する
    // 「役を2つ以上登録した（抽出された）」場合は、ここを通過できないため学習されません。
    if (globalUnknownWord && extractedYaku.length === 1) {
      globalAddedYaku = extractedYaku[0];
      log("【自動学習】未登録語句を1つの役として学習しました。");
    } else {
      // 役が複数抽出された場合、またはそもそも役が抽出されなかった場合は保留シートへ
      if (globalUnknownWord) {
        sendToPendingSheet(globalUnknownWord, normalizedText);
        log("【保留】言い直しで複数の役が抽出されたため、自動学習をキャンセルし保留しました。");
      }
      globalAddedYaku = "";
    }
    
    globalYakuArray.push(...extractedYaku);
    if (isKuiseagari) globalIsKuiseagari = true;
    isAddingMode = false; 
    log("【追加処理】前回までの役と合体させました。");
  } else {
    globalYakuArray = extractedYaku;
    globalIsKuiseagari = isKuiseagari;
    
    if (unknownParts) {
      globalUnknownWord = unknownParts;
    } else {
      globalUnknownWord = "";
    }
    globalAddedYaku = ""; 
  }

  globalYakuArray = [...new Set(globalYakuArray)];
  globalYakuArray.sort((a, b) => {
    let indexA = YAKU_ORDER.indexOf(a);
    let indexB = YAKU_ORDER.indexOf(b);
    if (indexA === -1) indexA = 999;
    if (indexB === -1) indexB = 999;
    return indexA - indexB;
  });

  log(`[現在の役リスト]: ${globalYakuArray.join(", ")}`);
  
  let isTsumo = globalYakuArray.includes("ツモ") || globalYakuArray.includes("嶺上開花") || globalYakuArray.includes("海底撈月") || globalYakuArray.includes("天和") || globalYakuArray.includes("地和");
  
  calculateScore(globalYakuArray, globalIsKuiseagari, isTsumo, false);
}

// 4. 合計翻数の計算とルート分岐判定
function calculateScore(yakuArray, isKuiseagari, isTsumo, isOya) {
  log("【点数計算フェーズ開始】");

  let yakumanList = yakuArray.filter(yaku => YAKU_HAN[yaku] === 13);
  if (yakumanList.length > 0) {
    yakuArray = yakumanList; 
    globalYakuArray = yakumanList; 
    log(`<span style="color:#d32f2f; font-weight:bold;">【役満検知！】通常の役やドラをすべて無効化しました。</span>`);
  }

  let totalHan = 0;
  let hasPinfu = false;
  let hasChiitoitsu = false;
  let hasToitoiSanankou = false;
  let isKuiseagariApplied = false; 

  for (let yaku of yakuArray) {
    let han = YAKU_HAN[yaku] || 0; 
    
    if (isKuiseagari && KUISEAGARI_YAKU.includes(yaku)) {
      han -= 1;
      isKuiseagariApplied = true; 
    }
    totalHan += han;

    if (yaku === "平和") hasPinfu = true;
    if (yaku === "七対子") hasChiitoitsu = true;
    if (yaku === "対々和" || yaku === "三暗刻") hasToitoiSanankou = true;
  }

  log(`最終計算翻数: ${totalHan}翻`);

  if (totalHan > 0) {
    showConfirmPopup(totalHan, hasPinfu, hasChiitoitsu, hasToitoiSanankou, isTsumo, isOya, yakuArray, isKuiseagariApplied);
  } else {
    log("<span style='color:red;'>エラー: 有効な役が抽出できませんでした</span>");
  }
}

function getCurrentDisplayWind(startWind, kyokuString) {
  // 局数（1〜4）を抽出
  const match = kyokuString.match(/(東|南|西|北)(\d+)局/);
  let kyokuNum = 1;
  if (match) {
    kyokuNum = Number(match[2]);
  }
  
  const winds = ["東", "南", "西", "北"];
  const startIndex = winds.indexOf(startWind);
  const shift = kyokuNum - 1; // 東2局なら1ズレる
  
  // ズレを計算して現在の風を返す
  return winds[(startIndex - shift + 4) % 4];
}

                            <span style="font-size:12px; color:#666; font-weight:normal; margin-right:2px;">確定役:</span>${yakuBadges}
                          </div>`;
    // ▲▲▲ 変更ここまで ▲▲▲

    const hanDisp = document.getElementById("hanDisplay");
    if (hanDisp) {
        hanDisp.innerHTML = hanText; // HTMLタグを認識させるため innerHTML に変更
        hanDisp.style.fontSize = "22px"; 
    }
    buttonsArea.style.display = "grid";
    buttonsArea.style.gap = "5px";
    
    // 自動計算可能な場合
    if (totalHan >= 5 || hasPinfu || hasChiitoitsu || totalHan === 4) {
      let autoFu = 30; 
      if (hasChiitoitsu) autoFu = 25;
      if (hasPinfu && isTsumo) autoFu = 20;

      btnAutoSubmit.style.display = "block";
      btnAutoSubmit.textContent = `このまま記録 (${autoFu}符)`;
      btnAutoSubmit.onclick = () => {
        sendMatchDataToGAS(globalYakuArray, totalHan, autoFu, isOya, isTsumo);
        popup.style.display = "none";
      };
      
      // ▼▼▼ 符のボタンが不要なときはラベルごと隠す ▼▼▼
      const fuLabel = document.getElementById("fuLabel");
      if (fuLabel) fuLabel.style.display = "none";
      buttonsArea.style.display = "none";
      // ▲▲▲
    } 
    // 符計算が必要な場合
    else {
      // ▼▼▼ 符のボタンが必要なときはラベルを表示する ▼▼▼
      const fuLabel = document.getElementById("fuLabel");
      if (fuLabel) fuLabel.style.display = "block";
      buttonsArea.style.display = "grid"; 
      // ▲▲▲

      let maxFu = 70;
      let defaultFu = 30;
      const max2KoutsuYaku = ["混全帯么九", "純全帯幺九", "三色同順", "一気通貫", "混全帯么九", "純全帯么九"];
      let hasMax2Koutsu = yakuArray.some(yaku => max2KoutsuYaku.includes(yaku));
      
      if (hasToitoiSanankou) { maxFu = 110; defaultFu = 40; } 
      else if (hasMax2Koutsu) { maxFu = 100; }

      let allFu = [30, 40, 50, 60, 70, 80, 90, 100, 110];
      let showFu = allFu.filter(f => f <= maxFu);
      
      let initialFuList = showFu.filter(f => [30, 40, 50, 60, 70].includes(f));
      let hiddenFuList = showFu.filter(f => f >= 80);

      const renderBtn = (fu) => {
          let btn = document.createElement("button");
          btn.textContent = fu + "符";
          if (fu === defaultFu) {
            btn.style.background = "#007bff"; btn.style.color = "#fff"; btn.style.border = "2px solid #0056b3";
            btn.textContent = `★ ${fu}符`;
          } else {
            btn.style.background = "#f8f9fa"; btn.style.color = "#333"; btn.style.border = "1px solid #ccc";
          }
          btn.style.padding = "10px 0"; // 横幅調整
          btn.style.borderRadius = "5px"; btn.style.fontSize = "16px";
          btn.style.cursor = "pointer"; 
          btn.style.width = "100%";
          btn.style.boxSizing = "border-box"; // 枠線を含めてサイズ計算
          btn.onclick = () => { sendMatchDataToGAS(globalYakuArray, totalHan, fu, isOya, isTsumo); popup.style.display = "none"; };
          return btn;
      };

      initialFuList.forEach(f => buttonsArea.appendChild(renderBtn(f)));

      if (hiddenFuList.length > 0) {
          let moreBtn = document.createElement("button");
          moreBtn.textContent = "全表示";
          moreBtn.style.background = "#6c757d"; moreBtn.style.color = "#fff";
          moreBtn.style.padding = "10px 15px"; moreBtn.style.borderRadius = "5px";
          moreBtn.style.flex = "1 1 40%";
          moreBtn.onclick = () => {
              moreBtn.remove();
              hiddenFuList.forEach(f => buttonsArea.appendChild(renderBtn(f)));
          };
          buttonsArea.appendChild(moreBtn);
      }
    }
  }
if (typeof currentTableData !== 'undefined' && currentTableData !== null) {
    const winnerSelect = document.getElementById('selectWinner');
    
    // 自分の座席を初期セット（環境に合わせて自動選択）
    if (winnerSelect && currentTableData.mySeat) {
      winnerSelect.value = currentTableData.mySeat;
    }

    // ▼▼▼ ここから追加：放銃者の3つ並びボタンを生成・更新する処理 ▼▼▼
    if (!isTsumo) {
      const loserContainer = document.getElementById('loserButtonsContainer');
      const hiddenLoserInput = document.getElementById('selectLoser');
      
      const players = [
        { wind: "東", name: currentTableData.eastName || "東家" },
        { wind: "南", name: currentTableData.southName || "南家" },
        { wind: "西", name: currentTableData.westName || "西家" },
        { wind: "北", name: currentTableData.northName || "北家" }
      ];

      const renderLoserButtons = () => {
        if (!loserContainer || !hiddenLoserInput || !winnerSelect) return;
        loserContainer.innerHTML = "";
        
        // アガリ者を除外した3人を抽出
        const currentWinner = winnerSelect.value;
        const losers = players.filter(p => p.wind !== currentWinner);
        
        // 隠しフィールドの値が不正（アガリ者と同じになっている等）ならリセット
        if (!losers.find(p => p.wind === hiddenLoserInput.value)) {
          hiddenLoserInput.value = losers[0].wind;
        }
        
        // ボタンを3つ生成
        losers.forEach(p => {
          let btn = document.createElement("div"); 
          btn.textContent = p.name;
          btn.style.flex = "1";
          btn.style.padding = "10px 0";
          btn.style.textAlign = "center";
          btn.style.borderRadius = "5px";
          btn.style.cursor = "pointer";
          btn.style.fontWeight = "bold";
          btn.style.fontSize = "14px";
          
          // 選択されている放銃者を赤色で強調
          if (p.wind === hiddenLoserInput.value) {
            btn.style.background = "#dc3545"; 
            btn.style.color = "#fff";
            btn.style.border = "2px solid #dc3545";
          } else {
            btn.style.background = "#f8f9fa";
            btn.style.color = "#333";
            btn.style.border = "1px solid #ccc";
          }
          
          // ボタンを押した時の挙動
          btn.onclick = () => {
            hiddenLoserInput.value = p.wind;
            renderLoserButtons(); // 再描画して色を更新
          };
          loserContainer.appendChild(btn);
        });
      };

      // 初回描画
      renderLoserButtons();

      // 「アガリ者」を変更した時に、自動的に「放銃者ボタン」も再生成して除外対象を変える
      winnerSelect.onchange = renderLoserButtons;
    }
    // ▲▲▲ 追加ここまで ▲▲▲
  }

  popup.style.display = "flex";
}

// 5. アガリ打点の計算ロジック
function calculateScorePoints(han, fu, isOya, isTsumo) {
  let basePoint = 0;
  
  if (han >= 13) basePoint = 8000; 
  else if (han >= 11) basePoint = 6000; 
  else if (han >= 8) basePoint = 4000; 
  else if (han >= 6) basePoint = 3000; 
  else if (han >= 5 || (han === 4 && fu >= 30) || (han === 3 && fu >= 60)) basePoint = 2000; 
  else {
    basePoint = fu * Math.pow(2, han + 2);
    if (basePoint > 2000) basePoint = 2000; 
  }

  let totalScore = 0;
  let displayText = ""; 
  
  if (isTsumo) {
    if (isOya) {
      let koPay = Math.ceil((basePoint * 2) / 100) * 100;
      totalScore = koPay * 3;
      displayText = `${koPay}オール`; 
    } else {
      let oyaPay = Math.ceil((basePoint * 2) / 100) * 100;
      let koPay = Math.ceil((basePoint * 1) / 100) * 100;
      totalScore = oyaPay + (koPay * 2);
      displayText = `${koPay} / ${oyaPay}`; 
    }
  } else {
    if (isOya) {
      totalScore = Math.ceil((basePoint * 6) / 100) * 100;
    } else {
      totalScore = Math.ceil((basePoint * 4) / 100) * 100;
    }
    displayText = `${totalScore}点`; 
  }
  return { total: totalScore, text: displayText };
}

// 【今回追加】裏でこっそり辞書に自動登録する関数（不足分）

// 6. GASへのデータ送信と結果表示
async function sendMatchDataToGAS(yakuArray, totalHan, fu, isOya, isTsumo) {
  if (globalUnknownWord && globalAddedYaku) {
    autoRegisterDictionary(globalUnknownWord, globalAddedYaku);
    globalUnknownWord = "";
    globalAddedYaku = "";
  }

  const scoreResult = calculateScorePoints(totalHan, fu, isOya, isTsumo);
  const scorePoint = scoreResult.total; 
  const scoreText = scoreResult.text;   
  
// 1. 新しく追加するプルダウンから、アガリ者と放銃者の「風」を取得
  const selectedWinnerWind = document.getElementById("selectWinner").value;
  const selectedLoserWind = document.getElementById("selectLoser").value;
  const agariType = isTsumo ? "ツモ" : "ロン";

  // 2. GASの新しい点数計算エンジンへ送るデータ構造
  const matchRecord = {
    action: "recordMatch",
    
    // 現在の卓の状況（点数、局、本場など）をまるごと送る
    currentData: JSON.stringify(currentTableData), 
    
    // アガリの内容（GAS側での点数計算用）
    agariData: JSON.stringify({
      winner: selectedWinnerWind,
      type: agariType,
      loser: isTsumo ? null : selectedLoserWind,
      points: scorePoint,   // 計算済みの打点（例: 8000）
      han: totalHan,        // 翻数
      fu: 0                 // ※もし符の変数があれば0から書き換えてください
    }),

    // 役履歴シートへの記録用
    yakuData: yakuArray.map(yaku => ({ 
      matchId: currentTableData.tableId, 
      winner: selectedWinnerWind, 
      yaku: yaku 
    }))
  };

  try {
    const response = await fetch(CONFIG_GAS_URL, {
      method: "POST",
      body: JSON.stringify(matchRecord)
    });
    const resultData = await response.json();

    if (resultData.result === "success") {
      showResultView(`【登録完了】<br>${totalHan}翻 ${fu}符<br><span style="font-size:24px;">${scoreText}</span>`, "#28a745", "#fff", 3000);
      log("スプレッドシートへの記録が完了しました。");
      setTimeout(() => {
        window.location.reload();
      }, 2000);
    } else {
      showResultView(`【登録エラー】`, "#dc3545", "#fff", 3000);
    }
  } catch (error) {
    showResultView(`【通信エラー】`, "#dc3545", "#fff", 3000);
  }
}

// リーチ状態を保持する変数（現在の局・本場とセットで管理）
// ▼▼ リーチ状態を管理する変数 ▼▼
let isCurrentlyRiichi = false;
let riichiKyokuId = "";
let isRiichiProcessing = false; // 🌟 追加：連打防止用のロック変数

// ▼▼ ボタンを押した時の処理（高速レスポンス版） ▼▼
document.getElementById('btnRiichi').addEventListener('click', function() {
  if (!currentTableData || !currentTableData.mySeat) return;
  
  // 🌟 追加：もし通信中（ロック中）なら、ここで処理をストップして連打を弾く
  if (isRiichiProcessing) return; 

  const currentKyokuId = currentTableData.kyoku + "-" + currentTableData.honba;
  const isCanceling = (isCurrentlyRiichi && riichiKyokuId === currentKyokuId);
  const targetAction = isCanceling ? "cancelRiichi" : "declareRiichi";

  // 🌟 追加：処理スタートと同時にロックをかける
  isRiichiProcessing = true; 
  document.getElementById('btnRiichi').style.opacity = "0.6"; // 少し透明にして「処理中」を視覚的に伝える

  // 1. 点数と供託の計算（宣言なら-1000、取消なら+1000）
  let scoreChange = isCanceling ? 1000 : -1000;
  let kyotakuChange = isCanceling ? -1 : 1;

  if (currentTableData.mySeat === "東") currentTableData.eastScore = Number(currentTableData.eastScore) + scoreChange;
  else if (currentTableData.mySeat === "南") currentTableData.southScore = Number(currentTableData.southScore) + scoreChange;
  else if (currentTableData.mySeat === "西") currentTableData.westScore = Number(currentTableData.westScore) + scoreChange;
  else if (currentTableData.mySeat === "北") currentTableData.northScore = Number(currentTableData.northScore) + scoreChange;

  currentTableData.kyotaku = Math.max(0, Number(currentTableData.kyotaku || 0) + kyotakuChange);

  // 2. 画面を即座にアップデート
  if (typeof setupMahjongTableUI === "function") {
    setupMahjongTableUI(currentTableData, myUserId);
  }

  // 3. ボタンの見た目も即座に切り替え
  if (isCanceling) {
    isCurrentlyRiichi = false;
    riichiKyokuId = "";
    updateRiichiButtonUI(false);
  } else {
    isCurrentlyRiichi = true;
    riichiKyokuId = currentKyokuId;
    updateRiichiButtonUI(true);
  }

  // =========================================================
  // 裏側（GAS）への通信
  // =========================================================
  const requestData = {
    action: targetAction,
    riichiWind: currentTableData.mySeat,
    currentData: JSON.stringify(currentTableData)
  };

  fetch(CONFIG_GAS_URL, { 
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(requestData)
  })
  .then(response => response.json())
  .then(data => {
    if (data.result !== "success") {
      alert("裏側でのデータ保存に失敗しました: " + data.message);
    }
  })
  .catch(error => {
    console.error('通信エラー:', error);
  })
  .finally(() => {
    // 🌟 追加：通信が完了した時（成功でも失敗でも）、必ずロックを解除する
    isRiichiProcessing = false;
    document.getElementById('btnRiichi').style.opacity = "1"; // 透明度を元に戻す
  });
});

// ▼▼ ボタンの見た目を切り替える関数 ▼▼
function updateRiichiButtonUI(isRiichi) {
  const btn = document.getElementById('btnRiichi');
  if (!btn) return;
  
  if (isRiichi) {
    btn.style.backgroundColor = "#ff1744"; 
    btn.style.border = "4px solid white";
    btn.innerText = "取消"; 
  } else {
    btn.style.backgroundColor = "#4caf50"; 
    btn.style.border = "2px solid white";
    btn.innerText = "リーチ";
  }
}

// プレビュー（点数移動）の計算と表示
function updateRyukyokuPreview() {
  const tenpaiCount = Object.values(tenpaiStatus).filter(v => v).length;
  let text = "";
  
  if (tenpaiCount === 0 || tenpaiCount === 4) {
    text = "全員" + (tenpaiCount === 0 ? "ノーテン" : "テンパイ") + "（点数移動なし）";
  } else if (tenpaiCount === 1) {
    text = "テンパイ1人（＋3,000） / ノーテン3人（－1,000）";
  } else if (tenpaiCount === 2) {
    text = "テンパイ2人（＋1,500） / ノーテン2人（－1,500）";
  } else if (tenpaiCount === 3) {
    text = "テンパイ3人（＋1,000） / ノーテン1人（－3,000）";
  }
  
  document.getElementById("ryukyokuPreview").textContent = text;
}

// 「これで確定する」ボタンを押したときの処理（GAS通信版）
async function submitRyukyoku() {
  const tenpaiCount = Object.values(tenpaiStatus).filter(v => v).length;
  
  if (!confirm("この内容で流局処理を確定しますか？\n（親のテンパイ有無により、本場や親が自動で移行します）")) return;
  
  // ポップアップを閉じて、送信中であることをユーザーに知らせる
  document.getElementById("ryukyokuPopup").style.display = "none";
  
  // 画面上にローディング表示を出す（ボタンを一時的に無効化するなど）
  const ryukyokuBtn = document.getElementById("btnRyukyoku");
  const originalBtnText = ryukyokuBtn.textContent;
  ryukyokuBtn.textContent = "⏳ GASへ送信中...";
  ryukyokuBtn.disabled = true;

  try {
    // GASへ送るデータのパッケージを作成
    const payload = {
      action: "ryukyoku",
      userId: myUserId,
      tenpaiData: JSON.stringify(tenpaiStatus),
      currentData: JSON.stringify(currentTableData) // ⬅️ ★現在の卓データを丸ごとGASに送る
    };

    // GASへPOST送信
    const res = await fetch(CONFIG_GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },       // ⬅️ ★ここが変わりました
      body: JSON.stringify(payload)                    // ⬅️ ★ここが変わりました
    });

    const result = await res.json();

    if (result.success) {
      // GAS側での点数計算とスプレッドシート書き込みが成功したら、
      // 返ってきた最新の卓データを使って、麻雀卓の表示を再描画（更新）する！
      alert("流局処理が完了しました！");
      setupMahjongTableUI(result.tableData, myUserId);
    } else {
      alert("エラーが発生しました: " + result.message);
    }
  } catch (error) {
    alert("通信エラーが発生しました: " + error.message);
  } finally {
    // ボタンの表示を元に戻す
    ryukyokuBtn.textContent = originalBtnText;
    ryukyokuBtn.disabled = false;
  }
}
