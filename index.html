<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>T-LEAGUE 対局管理</title>
  <style>
    /* 全体・麻雀卓のレイアウト */
    body { font-family: sans-serif; background: #f0f2f5; text-align: center; color: #333; margin: 0; padding: 20px; }
    .table-container { 
      position: relative; width: 340px; height: 340px; margin: 20px auto; 
      background: #2e7d32; border-radius: 15px; border: 6px solid #5d4037; 
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
    }
    
    /* 座席UI */
    .seat { 
      position: absolute; width: 90px; height: 46px; background: #1a1a1a; color: #fff;
      border-radius: 6px; display: flex; flex-direction: column; justify-content: center; 
      font-size: 12px; cursor: pointer; border: 2px solid #1a1a1a;
    }
    .seat.active-oya { border: 2px solid #ff5252; color: #ff5252; font-weight: bold; } /* 親マークの代わり */
    .seat-top { top: 10px; left: 125px; }
    .seat-bottom { bottom: 10px; left: 125px; }
    .seat-left { top: 147px; left: 10px; }
    .seat-right { top: 147px; right: 10px; }

    /* 中央情報エリア */
    .center-info { 
      position: absolute; top: 110px; left: 110px; width: 120px; height: 120px; 
      background: #e0e0e0; border-radius: 10px; display: flex; flex-direction: column; 
      justify-content: center; font-size: 14px; font-weight: bold; color: #000;
    }
    .center-info div { margin: 2px 0; }

    /* コントロール・ログエリア */
    .controls { margin-top: 20px; }
    button { padding: 12px 24px; font-size: 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
    #micBtn { background: #007bff; color: white; width: 260px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    #micBtn:disabled { background: #999; cursor: not-allowed; }
    
    #logArea { 
      margin: 20px auto; width: 90%; max-width: 340px; height: 120px; 
      background: #fff; color: #333; text-align: left; padding: 12px; 
      border-radius: 8px; border: 1px solid #ccc; overflow-y: auto; font-size: 14px;
    }
  </style>
</head>
<body>
  <h2>T-LEAGUE 対局管理</h2>
  
  <!-- 麻雀卓UI -->
  <div class="table-container">
    <div class="seat seat-top" id="seat-2">対面<br>25000</div>
    <div class="seat seat-left" id="seat-3">上家<br>25000</div>
    <div class="seat seat-right" id="seat-1">下家<br>25000</div>
    <div class="seat seat-bottom active-oya" id="seat-0">自分<br>25000</div>
    
    <div class="center-info">
      <div id="kyokuInfo">東1局</div>
      <div id="honbaInfo">0本場</div>
      <div id="kyotakuInfo">供託: 0</div>
    </div>
  </div>

  <div class="controls">
    <button id="micBtn" disabled>システムの準備中...</button>
  </div>

  <div id="confirmPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; justify-content:center; align-items:center;">
    <div style="background:#fff; padding:20px; border-radius:10px; width:90%; max-width:320px; text-align:center; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
      <h3 style="margin-top:0; color:#333; font-size:18px;">認識結果の確認</h3>
      <p id="confirmPopupInfo" style="font-size:16px; color:#333; margin-bottom:15px; font-weight:bold;"></p>
      
      <!-- 符選択エリア (ルート2用) -->
      <div id="fuButtonsArea" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-bottom:15px;"></div>
      
      <!-- アクションエリア -->
      <div style="display:flex; justify-content:space-between; gap:10px; margin-bottom:10px;">
        <button id="btnAutoSubmit" style="display:none; flex:1; background:#28a745; color:#fff; padding:12px; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">このまま記録</button>
      </div>
      <div style="display:flex; justify-content:space-between; gap:10px; margin-bottom:10px;">
        <button onclick="startAddVoice()" style="flex:1; background:#17a2b8; color:#fff; padding:10px; border:none; border-radius:5px; cursor:pointer;">🎤 追加</button>
        <button onclick="startRetryVoice()" style="flex:1; background:#ffc107; color:#333; padding:10px; border:none; border-radius:5px; cursor:pointer;">🔄 やり直し</button>
      </div>
      <button onclick="document.getElementById('confirmPopup').style.display='none'" style="width:100%; background:#6c757d; color:#fff; padding:10px; border:none; border-radius:5px; cursor:pointer;">キャンセル</button>
    </div>
  </div>

  <div id="resultView" style="display:none; position:fixed; top:20px; left:50%; transform:translateX(-50%); color:#fff; padding:15px 20px; border-radius:8px; z-index:200; width:80%; max-width:300px; text-align:center; box-shadow:0 4px 6px rgba(0,0,0,0.3); font-weight:bold;">
    <div id="resultText"></div>
  </div>

  <div class="box-title">【デバッグ・認識結果ログ】</div>
  <div id="logArea">辞書データをダウンロードしています...<br></div>

<script>
    // 先ほどデプロイした新しいGASのWebアプリURLに書き換えてください
// 先ほどデプロイした新しいGASのWebアプリURLに書き換えてください
const CONFIG_GAS_URL = "https://script.google.com/macros/s/AKfycbxApVeyJSrYaWtUDyttPUbUdvMgs3OknGQ5ZuLz9AhdJxrxa3S3KQsgQK1VUJ6z6kI/exec"; 

let dictionary = {};
let globalYakuArray = [];
let globalIsKuiseagari = false;
let isAddingMode = false;
let globalUnknownWord = ""; 
let globalAddedYaku = "";

// 役名から基本翻数を引くためのマスタ定義（抜粋）
const YAKU_HAN = {
  "リーチ": 1, "ツモ": 1, "一発": 1, "海底撈月": 1, "河底撈魚": 1, "嶺上開花": 1, "槍槓": 1, "平和": 1, "断么九": 1, "一盃口": 1,
  "役牌": 1, "役牌2": 2, "役牌3": 3, "役牌4": 4,
  "ドラ": 1, "ドラ2": 2, "ドラ3": 3, "ドラ4": 4, "ドラ5": 5,"ドラ6": 6, "ドラ7": 7, "ドラ8": 8, "ドラ9": 9, "ドラ10": 10, 
  "ダブルリーチ": 2, "三槓子": 2, "三色同順": 2, "三色同刻": 2, "一気通貫": 2, "混全帯么九": 2, "七対子": 2, "対々和": 2, "三暗刻": 2, "混老頭": 2,
  "混一色": 3, "純全帯么九": 3, "二盃口": 3,
  "小三元": 4,
  "清一色": 6,
  "四暗刻": 13, "清老頭": 13, "大三元": 13, "小四喜": 13, "大四喜": 13, "緑一色": 13, "九蓮宝燈": 13, "国士無双": 13, "天和": 13, "地和": 13,
  "字一色": 13, "四槓子": 13
};

// 役の綺麗な表示順
const YAKU_ORDER = [
  "天和", "地和", "四暗刻", "国士無双", "大三元", "小四喜", "大四喜", "字一色", "緑一色", "清老頭", "九蓮宝燈", "四槓子",
  "リーチ", "ダブルリーチ", "一発", "ツモ", "海底撈月", "河底撈魚", "嶺上開花", "槍槓", "役牌", "役牌2", "役牌3", "役牌4",
  "平和", "断么九", "一盃口", "三色同順", "一気通貫", "混全帯么九", "七対子", "対々和", "三暗刻", "混老頭", "三槓子",
  "二盃口", "純全帯么九", "混一色", "小三元", "清一色",
  "ドラ", "ドラ2", "ドラ3", "ドラ4", "ドラ5", "ドラ6", "ドラ7", "ドラ8", "ドラ9", "ドラ10"
];

// 喰い下がり対象の役リスト
const KUISEAGARI_YAKU = ["混一色", "三色同順", "一気通貫", "混全帯么九", "純全帯么九", "清一色"];

// 1. 辞書データの読み込み（エラー検知を強化）
async function loadDictionary() {
  const micBtn = document.getElementById('micBtn');
  try {
    const response = await fetch(CONFIG_GAS_URL + "?action=getDictionary");
    const resultData = await response.json();

    if (resultData.result === "success") {
      dictionary = resultData.dictionary;
      if(micBtn) {
        micBtn.disabled = false;
        micBtn.textContent = "🎤 アガリ役を音声入力";
      }
      log("辞書の読み込みが完了しました。");
      initSpeechRecognition();
    } else {
      // GASは応答したがエラーを返した場合
      log(`<span style="color:red;">【エラー】GASからエラーが返されました。GASのコードを確認してください。</span>`);
      if(micBtn) micBtn.textContent = "エラーが発生しました";
    }
  } catch (error) {
    // URL間違いやデプロイ忘れによる通信失敗
    log(`<span style="color:red;">【通信エラー】辞書が取得できません。GASのURLかデプロイ状況を確認してください。</span>`);
    if(micBtn) micBtn.textContent = "通信エラー";
  }
}

// 2. 音声認識の初期化
function initSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return;

  const recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = false; 

  const micBtn = document.getElementById('micBtn');
  if(!micBtn) return;

  recognition.onstart = () => {
    micBtn.textContent = "⏹ 録音中...";
    micBtn.style.background = "#dc3545"; 
  };

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    processSpeech(transcript);
  };

  recognition.onend = () => {
    micBtn.textContent = "🎤 アガリ役を音声入力";
    micBtn.style.background = "#007bff";
  };

  micBtn.addEventListener('click', () => {
    recognition.start(); 
  });
}

// 3. テキストからの役抽出・変換・鳴きあり処理
function processSpeech(text) {
  let normalizedText = text.replace(/[\s ]+/g, "");
  log(`[音声認識(補正後)]: ${normalizedText}`);

  let extractedYaku = [];
  let isKuiseagari = false;
  let remainingText = normalizedText;

  if (remainingText.includes("鳴きあり") || remainingText.includes("なきあり")) {
    isKuiseagari = true;
    remainingText = remainingText.replace(/鳴きあり|なきあり/g, "");
  }

  const sortedKeys = Object.keys(dictionary).sort((a, b) => b.length - a.length);

  for (const key of sortedKeys) {
    if (remainingText.includes(key)) {
      let officialName = dictionary[key];
      if (officialName !== "除外") {
        let splitYaku = officialName.split(/[、，,\s]+/);
        extractedYaku.push(...splitYaku);
      }
      remainingText = remainingText.replace(new RegExp(key, 'g'), "");
    }
  }

  if (extractedYaku.includes("鳴きあり")) {
    isKuiseagari = true;
    extractedYaku = extractedYaku.filter(yaku => yaku !== "鳴きあり");
  }

  let unknownParts = remainingText.replace(/[、，,\s]+/g, "").trim();
  if (unknownParts.length === 1 && /^[ぁ-んァ-ヶ]$/.test(unknownParts)) unknownParts = "";
  
  if (unknownParts.length > 0) {
    log(`<span style="color:red;">【警告】未登録の言葉が含まれています: 「${unknownParts}」</span>`);
  }

  // ▼ 学習ロジック ▼
  if (isAddingMode) {
    if (extractedYaku.length === 1) {
      globalAddedYaku = extractedYaku[0];
    } else {
      globalAddedYaku = ""; 
    }
    
    globalYakuArray.push(...extractedYaku);
    if (isKuiseagari) globalIsKuiseagari = true;
    isAddingMode = false; 
    log("【追加処理】前回までの役と合体させました。");
  } else {
    globalYakuArray = extractedYaku;
    globalIsKuiseagari = isKuiseagari;
    
    if (unknownParts) {
      globalUnknownWord = unknownParts;
    } else {
      globalUnknownWord = "";
    }
    globalAddedYaku = ""; 
  }

  globalYakuArray = [...new Set(globalYakuArray)];
  globalYakuArray.sort((a, b) => {
    let indexA = YAKU_ORDER.indexOf(a);
    let indexB = YAKU_ORDER.indexOf(b);
    if (indexA === -1) indexA = 999;
    if (indexB === -1) indexB = 999;
    return indexA - indexB;
  });

  log(`[現在の役リスト]: ${globalYakuArray.join(", ")}`);
  
  let isTsumo = globalYakuArray.includes("ツモ") || globalYakuArray.includes("嶺上開花") || globalYakuArray.includes("海底撈月") || globalYakuArray.includes("天和") || globalYakuArray.includes("地和");
  
  calculateScore(globalYakuArray, globalIsKuiseagari, isTsumo, false);
}

// 4. 合計翻数の計算とルート分岐判定
function calculateScore(yakuArray, isKuiseagari, isTsumo, isOya) {
  log("【点数計算フェーズ開始】");

  let yakumanList = yakuArray.filter(yaku => YAKU_HAN[yaku] === 13);
  if (yakumanList.length > 0) {
    yakuArray = yakumanList; 
    globalYakuArray = yakumanList; 
    log(`<span style="color:#d32f2f; font-weight:bold;">【役満検知！】通常の役やドラをすべて無効化しました。</span>`);
  }

  let totalHan = 0;
  let hasPinfu = false;
  let hasChiitoitsu = false;
  let hasToitoiSanankou = false;
  let isKuiseagariApplied = false; 

  for (let yaku of yakuArray) {
    let han = YAKU_HAN[yaku] || 0; 
    
    if (isKuiseagari && KUISEAGARI_YAKU.includes(yaku)) {
      han -= 1;
      isKuiseagariApplied = true; 
    }
    totalHan += han;

    if (yaku === "平和") hasPinfu = true;
    if (yaku === "七対子") hasChiitoitsu = true;
    if (yaku === "対々和" || yaku === "三暗刻") hasToitoiSanankou = true;
  }

  log(`最終計算翻数: ${totalHan}翻`);

  if (totalHan > 0) {
    showConfirmPopup(totalHan, hasPinfu, hasChiitoitsu, hasToitoiSanankou, isTsumo, isOya, yakuArray, isKuiseagariApplied);
  } else {
    log("<span style='color:red;'>エラー: 有効な役が抽出できませんでした</span>");
  }
}

// 統合された確認・アクションポップアップ
function showConfirmPopup(totalHan, hasPinfu, hasChiitoitsu, hasToitoiSanankou, isTsumo, isOya, yakuArray, isKuiseagariApplied) {
  const popup = document.getElementById('confirmPopup');
  const infoText = document.getElementById('confirmPopupInfo');
  const buttonsArea = document.getElementById('fuButtonsArea');
  const btnAutoSubmit = document.getElementById('btnAutoSubmit');
  
  let hanText = `${totalHan}翻`;
  if (isKuiseagariApplied) {
    hanText += `<span style="font-size:14px; color:#555;"> (食い下がり)</span>`;
  }
  
  infoText.innerHTML = `確定役: ${yakuArray.join(", ")}<br>計算翻数: <b style="color:#e91e63;">${hanText}</b>`;
  buttonsArea.innerHTML = ""; 
  
  if (totalHan >= 5 || hasPinfu || hasChiitoitsu || totalHan === 4) {
    let autoFu = 30; 
    if (hasChiitoitsu) autoFu = 25;
    if (hasPinfu && isTsumo) autoFu = 20;

    btnAutoSubmit.style.display = "block";
    btnAutoSubmit.textContent = `このまま記録 (${autoFu}符)`;
    btnAutoSubmit.onclick = () => {
      sendMatchDataToGAS(globalYakuArray, totalHan, autoFu, isOya, isTsumo);
      popup.style.display = "none";
    };
  } else {
    btnAutoSubmit.style.display = "none"; 
    
    let maxFu = 70;
    let defaultFu = 30;
    const max2KoutsuYaku = ["混全帯么九", "純全帯么九", "三色同順", "一気通貫"];
    let hasMax2Koutsu = yakuArray.some(yaku => max2KoutsuYaku.includes(yaku));
    
    if (hasToitoiSanankou) { maxFu = 110; defaultFu = 40; } 
    else if (hasMax2Koutsu) { maxFu = 100; }

    let availableFu = [30, 40, 50, 60, 70, 80, 90, 100, 110];
    for (let fu of availableFu) {
      if (fu <= maxFu) {
        let btn = document.createElement("button");
        btn.textContent = fu + "符";
        if (fu === defaultFu) {
          btn.style.background = "#007bff";
          btn.style.color = "#fff";
          btn.style.border = "2px solid #0056b3";
          btn.textContent = `★ ${fu}符`;
        } else {
          btn.style.background = "#f8f9fa";
          btn.style.color = "#333";
          btn.style.border = "1px solid #ccc";
        }
        btn.style.padding = "10px 15px";
        btn.style.borderRadius = "5px";
        btn.style.fontSize = "16px";
        btn.style.cursor = "pointer";
        btn.style.flex = "1 1 25%";
        
        btn.onclick = () => {
          sendMatchDataToGAS(globalYakuArray, totalHan, fu, isOya, isTsumo);
          popup.style.display = "none";
        };
        buttonsArea.appendChild(btn);
      }
    }
  }
  popup.style.display = "flex";
}

function startAddVoice() {
  isAddingMode = true;
  document.getElementById('confirmPopup').style.display = "none";
  log("🎤 【追加】さらに役を発声してください...");
  document.getElementById('micBtn').click(); 
}

function startRetryVoice() {
  isAddingMode = false;
  globalYakuArray = []; 
  globalIsKuiseagari = false;
  
  globalUnknownWord = ""; 
  globalAddedYaku = "";   
  
  document.getElementById('confirmPopup').style.display = "none";
  log("🔄 【やり直し】もう一度すべての役を発声してください...");
  document.getElementById('micBtn').click(); 
}

// 5. アガリ打点の計算ロジック
function calculateScorePoints(han, fu, isOya, isTsumo) {
  let basePoint = 0;
  
  if (han >= 13) basePoint = 8000; 
  else if (han >= 11) basePoint = 6000; 
  else if (han >= 8) basePoint = 4000; 
  else if (han >= 6) basePoint = 3000; 
  else if (han >= 5 || (han === 4 && fu >= 30) || (han === 3 && fu >= 60)) basePoint = 2000; 
  else {
    basePoint = fu * Math.pow(2, han + 2);
    if (basePoint > 2000) basePoint = 2000; 
  }

  let totalScore = 0;
  let displayText = ""; 
  
  if (isTsumo) {
    if (isOya) {
      let koPay = Math.ceil((basePoint * 2) / 100) * 100;
      totalScore = koPay * 3;
      displayText = `${koPay}オール`; 
    } else {
      let oyaPay = Math.ceil((basePoint * 2) / 100) * 100;
      let koPay = Math.ceil((basePoint * 1) / 100) * 100;
      totalScore = oyaPay + (koPay * 2);
      displayText = `${koPay} / ${oyaPay}`; 
    }
  } else {
    if (isOya) {
      totalScore = Math.ceil((basePoint * 6) / 100) * 100;
    } else {
      totalScore = Math.ceil((basePoint * 4) / 100) * 100;
    }
    displayText = `${totalScore}点`; 
  }
  return { total: totalScore, text: displayText };
}

// 【今回追加】裏でこっそり辞書に自動登録する関数（不足分）
async function autoRegisterDictionary(raw, official) {
  try {
    const targetUrl = CONFIG_GAS_URL + "?action=addDictionary" 
      + "&rawText=" + encodeURIComponent(raw) 
      + "&officialText=" + encodeURIComponent(official);
    await fetch(targetUrl, { method: "GET" });
    log(`<span style="color:#06C755;">【自動学習完了】「${raw}」を「${official}」として辞書に登録しました。</span>`);
    dictionary[raw] = official; 
  } catch (error) {
    log(`<span style="color:red;">【自動学習エラー】辞書の登録に失敗しました。</span>`);
  }
}

// 6. GASへのデータ送信と結果表示
async function sendMatchDataToGAS(yakuArray, totalHan, fu, isOya, isTsumo) {
  if (globalUnknownWord && globalAddedYaku) {
    autoRegisterDictionary(globalUnknownWord, globalAddedYaku);
    globalUnknownWord = "";
    globalAddedYaku = "";
  }

  const scoreResult = calculateScorePoints(totalHan, fu, isOya, isTsumo);
  const scorePoint = scoreResult.total; 
  const scoreText = scoreResult.text;   
  
  showResultView(`送信しています...<br>${yakuArray.join(", ")}<br>${totalHan}翻 ${fu}符`, "#ffc107", "#000");

  const matchRecord = {
    action: "recordMatch",
    matchData: ["A_20260708_01", "A", 1, 0, 0, (isTsumo ? "ツモ" : "ロン"), "自分", "対面", totalHan, scorePoint, ""], 
    yakuData: yakuArray.map(yaku => ({ matchId: "A_20260708_01", winner: "自分", yaku: yaku }))
  };

  try {
    const response = await fetch(CONFIG_GAS_URL, {
      method: "POST",
      body: JSON.stringify(matchRecord)
    });
    const resultData = await response.json();

    if (resultData.result === "success") {
      showResultView(`【登録完了】<br>${totalHan}翻 ${fu}符<br><span style="font-size:24px;">${scoreText}</span>`, "#28a745", "#fff", 3000);
      log("スプレッドシートへの記録が完了しました。");
    } else {
      showResultView(`【登録エラー】`, "#dc3545", "#fff", 3000);
    }
  } catch (error) {
    showResultView(`【通信エラー】`, "#dc3545", "#fff", 3000);
  }
}

function showResultView(htmlMessage, bgColor, textColor, hideAfterMs = null) {
  const view = document.getElementById('resultView');
  const textDiv = document.getElementById('resultText');
  
  textDiv.innerHTML = htmlMessage;
  view.style.background = bgColor;
  view.style.color = textColor;
  view.style.display = "block";
  
  if (hideAfterMs) {
    setTimeout(() => {
      view.style.display = "none";
    }, hideAfterMs);
  }
}

function log(message) {
  const logArea = document.getElementById('logArea');
  if(logArea) {
    logArea.innerHTML += message + "<br>";
    logArea.scrollTop = logArea.scrollHeight;
  }
}

window.onload = () => {
  loadDictionary();
};
</script>
</body>
</html>
