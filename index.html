<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>T-LEAGUE 対局管理</title>
  <style>
    /* 全体・麻雀卓のレイアウト */
    body { font-family: sans-serif; background: #f0f2f5; text-align: center; color: #333; margin: 0; padding: 20px; }
    .table-container { 
      position: relative; width: 340px; height: 340px; margin: 20px auto; 
      background: #2e7d32; border-radius: 15px; border: 6px solid #5d4037; 
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
    }
    
    /* 座席UI */
    .seat { 
      position: absolute; width: 90px; height: 46px; background: #1a1a1a; color: #fff;
      border-radius: 6px; display: flex; flex-direction: column; justify-content: center; 
      font-size: 12px; cursor: pointer; border: 2px solid #1a1a1a;
    }
    .seat.active-oya { border: 2px solid #ff5252; color: #ff5252; font-weight: bold; } /* 親マークの代わり */
    .seat-top { top: 10px; left: 125px; }
    .seat-bottom { bottom: 10px; left: 125px; }
    .seat-left { top: 147px; left: 10px; }
    .seat-right { top: 147px; right: 10px; }

    /* 中央情報エリア */
    .center-info { 
      position: absolute; top: 110px; left: 110px; width: 120px; height: 120px; 
      background: #e0e0e0; border-radius: 10px; display: flex; flex-direction: column; 
      justify-content: center; font-size: 14px; font-weight: bold; color: #000;
    }
    .center-info div { margin: 2px 0; }

    /* コントロール・ログエリア */
    .controls { margin-top: 20px; }
    button { padding: 12px 24px; font-size: 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
    #micBtn { background: #007bff; color: white; width: 200px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    #micBtn:disabled { background: #999; cursor: not-allowed; }
    
    #logArea { 
      margin: 20px auto; width: 90%; max-width: 340px; height: 120px; 
      background: #fff; color: #333; text-align: left; padding: 12px; 
      border-radius: 8px; border: 1px solid #ccc; overflow-y: auto; font-size: 14px;
    }
  </style>
</head>
<body>
  <h2>T-LEAGUE 対局管理</h2>
  
  <!-- 麻雀卓UI -->
  <div class="table-container">
    <div class="seat seat-top" id="seat-2">対面<br>25000</div>
    <div class="seat seat-left" id="seat-3">上家<br>25000</div>
    <div class="seat seat-right" id="seat-1">下家<br>25000</div>
    <div class="seat seat-bottom active-oya" id="seat-0">自分<br>25000</div>
    
    <div class="center-info">
      <div id="kyokuInfo">東1局</div>
      <div id="honbaInfo">0本場</div>
      <div id="kyotakuInfo">供託: 0</div>
    </div>
  </div>

  <div class="controls">
    <button id="micBtn" disabled>システムの準備中...</button>
  </div>

  <div id="fuPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; justify-content:center; align-items:center;">
    <div style="background:#fff; padding:20px; border-radius:10px; width:90%; max-width:320px; text-align:center; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
      <h3 style="margin-top:0; color:#333; font-size:18px;">符を選択してください</h3>
      <p id="fuPopupInfo" style="font-size:14px; color:#666; margin-bottom:15px;"></p>
      
      <div id="fuButtonsArea" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-bottom:15px;">
        </div>
      
      <button onclick="document.getElementById('fuPopup').style.display='none'" style="background:#6c757d; color:#fff; padding:10px 20px; border:none; border-radius:5px;">キャンセル</button>
    </div>
  </div>

  <div id="resultView" style="display:none; position:fixed; top:20px; left:50%; transform:translateX(-50%); color:#fff; padding:15px 20px; border-radius:8px; z-index:200; width:80%; max-width:300px; text-align:center; box-shadow:0 4px 6px rgba(0,0,0,0.3); font-weight:bold;">
    <div id="resultText"></div>
  </div>

  <div class="box-title">【デバッグ・認識結果ログ】</div>
  <div id="logArea">辞書データをダウンロードしています...<br></div>

<script>
    // 先ほどデプロイした新しいGASのWebアプリURLに書き換えてください
    const CONFIG_GAS_URL = "https://script.google.com/macros/s/AKfycbxApVeyJSrYaWtUDyttPUbUdvMgs3OknGQ5ZuLz9AhdJxrxa3S3KQsgQK1VUJ6z6kI/exec"; 
    
    let dictionary = {};

    // ＝＝＝ 今回追加した設定（1の部分） ＝＝＝
    // 役名から基本翻数を引くためのマスタ定義（抜粋）
    const YAKU_HAN = {
      "リーチ": 1, "ツモ": 1, "一発": 1, "海底撈月": 1, "河底撈魚": 1, "嶺上開花": 1, "槍槓": 1, "平和": 1, "断么九": 1, "一盃口": 1,
      "役牌": 1, "役牌2": 2, "役牌3": 3, "役牌4": 4,
      "ドラ": 1, "ドラ2": 2, "ドラ3": 3, "ドラ4": 4, "ドラ5": 5,"ドラ6": 6, "ドラ7": 7, "ドラ8": 8, "ドラ9": 9, "ドラ10": 10, 
      "ダブルリーチ": 2, "三槓子": 2, "三色同順": 2, "三色同刻": 2, "一気通貫": 2, "混全帯幺九": 2, "七対子": 2, "対々和": 2, "三暗刻": 2, "混老頭": 2,
      "混一色": 3, "純全帯幺九": 3, "二盃口": 3,
      "小三元": 4,
      "清一色": 6,
      "四暗刻": 13, "清老頭": 13, "大三元": 13, "小四喜": 13, "大四喜": 13, "緑一色": 13, "九蓮宝燈": 13, "国士無双": 13, "天和": 13, "地和": 13,
      "字一色": 13, "四槓子": 13
    };
    // ▼ 今回追加：役の綺麗な表示順（上に書いたものほど先に表示される）
    const YAKU_ORDER = [
      "天和", "地和", "四暗刻", "国士無双", "大三元", "小四喜", "大四喜", "字一色", "緑一色", "清老頭", "九蓮宝燈", "四槓子", // 役満を一番上
      "リーチ", "ダブルリーチ", "一発", "ツモ", "海底撈月", "河底撈魚", "嶺上開花", "槍槓", "役牌", "役牌2", "役牌3", "役牌4",
      "平和", "断么九", "一盃口", "三色同順", "一気通貫", "混全帯幺九", "七対子", "対々和", "三暗刻", "混老頭", "三槓子",
      "二盃口", "純全帯幺九", "混一色", "小三元", "清一色",
      "ドラ", "ドラ2", "ドラ3", "ドラ4", "ドラ5", "ドラ6", "ドラ7", "ドラ8", "ドラ9", "ドラ10" // ドラ系は一番下
    ];
    // 喰い下がり（鳴きあり）対象の役リスト
    const KUISEAGARI_YAKU = ["混一色", "三色同順", "一気通貫", "混全帯幺九", "純全帯幺九", "清一色"];
    // ＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝

    // 1. 辞書データの読み込み
async function loadDictionary() {
  try {
    const response = await fetch(CONFIG_GAS_URL + "?action=getDictionary");
    const resultData = await response.json();

    if (resultData.result === "success") {
      dictionary = resultData.dictionary;
      const micBtn = document.getElementById('micBtn');
      if(micBtn) {
        micBtn.disabled = false;
        micBtn.textContent = "🎤 アガリ役を音声入力";
      }
      log("辞書の読み込みが完了しました。");
      initSpeechRecognition();
    }
  } catch (error) {
    log("通信エラー: 辞書が取得できません。URLを確認してください。");
  }
}

// 2. 音声認識の初期化
function initSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return;

  const recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = false; 

  const micBtn = document.getElementById('micBtn');
  if(!micBtn) return;

  recognition.onstart = () => {
    micBtn.textContent = "⏹ 録音中...";
    micBtn.style.background = "#dc3545"; 
  };

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    processSpeech(transcript);
  };

  recognition.onend = () => {
    micBtn.textContent = "🎤 アガリ役を音声入力";
    micBtn.style.background = "#007bff";
  };

  micBtn.addEventListener('click', () => {
    recognition.start(); 
  });
}

// 3. テキストからの役抽出・変換・鳴きあり処理
function processSpeech(text) {
  let normalizedText = text.replace(/[\s ]+/g, "");
  log(`[音声認識(補正後)]: ${normalizedText}`);

  let yakuArray = [];
  let isKuiseagari = false;
  let remainingText = normalizedText;

  if (remainingText.includes("鳴きあり") || remainingText.includes("なきあり")) {
    isKuiseagari = true;
    remainingText = remainingText.replace(/鳴きあり|なきあり/g, "");
  }

  const sortedKeys = Object.keys(dictionary).sort((a, b) => b.length - a.length);

  for (const key of sortedKeys) {
    if (remainingText.includes(key)) {
      let officialName = dictionary[key];
      
      if (officialName !== "除外") {
        let splitYaku = officialName.split(/[、，,\s]+/);
        yakuArray.push(...splitYaku);
      }
      remainingText = remainingText.replace(new RegExp(key, 'g'), "");
    }
  }

  let unknownParts = remainingText.replace(/[、，,\s]+/g, "").trim();

  if (unknownParts.length === 1 && /^[ぁ-んァ-ヶ]$/.test(unknownParts)) {
    unknownParts = "";
  }

  if (unknownParts.length > 0) {
    log(`<span style="color:red;">【警告】未登録の言葉が含まれています: 「${unknownParts}」</span>`);
  }
  

  // ▼ 今回追加：抽出した役リストを麻雀の一般的な順番に並び替え
  yakuArray.sort((a, b) => {
  let indexA = YAKU_ORDER.indexOf(a);
  let indexB = YAKU_ORDER.indexOf(b);
  // リストに定義されていない役（未知の言葉）は一番後ろに回す
  if (indexA === -1) indexA = 999;
  if (indexB === -1) indexB = 999;
    return indexA - indexB;
  });

  // ＝＝（既存のまま）＝＝
  log(`[抽出役リスト]: ${yakuArray.join(", ")}`);
  log(`[鳴きあり判定]: ${isKuiseagari ? "適用 (1翻マイナス)" : "なし"}`);    
  calculateScore(yakuArray, isKuiseagari, false, false);
}

// 4. 合計翻数の計算とルート分岐判定
function calculateScore(yakuArray, isKuiseagari, isTsumo, isOya) {
  let totalHan = 0;
  let hasPinfu = false;
  let hasChiitoitsu = false;
  let hasToitoiSanankou = false;

  log("【点数計算フェーズ開始】");

  for (let yaku of yakuArray) {
    let han = 0;
    if (yaku.includes("ドラ") || yaku.includes("赤")) {
      let match = yaku.match(/\d+/);
      han = match ? parseInt(match[0], 10) : 1;
    } else {
      han = YAKU_HAN[yaku] || 0; 
    }
    
    if (isKuiseagari && KUISEAGARI_YAKU.includes(yaku)) han -= 1;
    totalHan += han;

    if (yaku === "平和") hasPinfu = true;
    if (yaku === "七対子") hasChiitoitsu = true;
    if (yaku === "対々和" || yaku === "三暗刻") hasToitoiSanankou = true;
  }

  log(`最終計算翻数: ${totalHan}翻`);

  // ルート分岐の呼び出し（yakuArrayを一緒に渡すように修正）
  if (totalHan >= 5 || hasPinfu || hasChiitoitsu || totalHan === 4) {
    executeRoute1(totalHan, hasPinfu, hasChiitoitsu, isTsumo, isOya, yakuArray);
  } else if (totalHan > 0) {
    showFuPopup(totalHan, hasToitoiSanankou, yakuArray, isTsumo, isOya);
  } else {
    log("<span style='color:red;'>エラー: 有効な役が抽出できませんでした</span>");
  }
}

// ルート1の処理（ポップアップを出さずに即座に送信）
function executeRoute1(totalHan, hasPinfu, hasChiitoitsu, isTsumo, isOya, yakuArray) {
  let autoFu = 30; // 基本を30符とする
  if (hasChiitoitsu) autoFu = 25;
  if (hasPinfu && isTsumo) autoFu = 20;

  sendMatchDataToGAS(yakuArray, totalHan, autoFu, isOya, isTsumo);
}

// ルート2のポップアップ処理（画面にUIを描画する）
function showFuPopup(totalHan, hasToitoiSanankou, yakuArray, isTsumo, isOya) {
  let maxFu = 70;
  let defaultFu = 30;

  const max2KoutsuYaku = ["混全帯幺九", "純全帯幺九", "三色同順", "一気通貫"];
  let hasMax2Koutsu = yakuArray.some(yaku => max2KoutsuYaku.includes(yaku));
  
  if (hasToitoiSanankou) { maxFu = 110; defaultFu = 40; } 
  else if (hasMax2Koutsu) { maxFu = 100; }

  // HTMLの要素を取得して文字をセット
  const popup = document.getElementById('fuPopup');
  const infoText = document.getElementById('fuPopupInfo');
  const buttonsArea = document.getElementById('fuButtonsArea');
  
  infoText.innerHTML = `確定役: ${yakuArray.join(", ")}<br>計算翻数: <b>${totalHan}翻</b>`;
  buttonsArea.innerHTML = ""; // ボタンエリアをリセット

  // 動的にボタンを生成して並べる
  let availableFu = [30, 40, 50, 60, 70, 80, 90, 100, 110];
  for (let fu of availableFu) {
    if (fu <= maxFu) {
      let btn = document.createElement("button");
      btn.textContent = fu + "符";
      
      // デフォルトのボタンだけ色を変える
      if (fu === defaultFu) {
        btn.style.background = "#007bff";
        btn.style.color = "#fff";
        btn.style.border = "2px solid #0056b3";
        btn.textContent = `★ ${fu}符`;
      } else {
        btn.style.background = "#f8f9fa";
        btn.style.color = "#333";
        btn.style.border = "1px solid #ccc";
      }
      
      btn.style.padding = "10px 15px";
      btn.style.borderRadius = "5px";
      btn.style.fontSize = "16px";
      btn.style.cursor = "pointer";
      btn.style.flex = "1 1 25%"; // 綺麗に折り返して並べる
      
      // ボタンが押されたら送信してポップアップを消す
      btn.onclick = () => {
        sendMatchDataToGAS(yakuArray, totalHan, fu, isOya, isTsumo);
        popup.style.display = "none";
      };
      
      buttonsArea.appendChild(btn);
    }
  }

  // 準備ができたので画面に表示
  popup.style.display = "flex";
}

// 5. アガリ打点の計算ロジック
function calculateScorePoints(han, fu, isOya, isTsumo) {
  let basePoint = 0;
  if (han >= 13) basePoint = 8000; 
  else if (han >= 11) basePoint = 6000; 
  else if (han >= 8) basePoint = 4000; 
  else if (han >= 6) basePoint = 3000; 
  else if (han >= 5 || (han === 4 && fu >= 30) || (han === 3 && fu >= 60)) basePoint = 2000; 
  else {
    basePoint = fu * Math.pow(2, han + 2);
    if (basePoint > 2000) basePoint = 2000; 
  }

  let totalScore = 0;
  if (isOya) totalScore = Math.ceil((basePoint * 6) / 100) * 100;
  else totalScore = Math.ceil((basePoint * 4) / 100) * 100;
  return totalScore;
}

// 6. GASへのデータ送信と結果表示
async function sendMatchDataToGAS(yakuArray, totalHan, fu, isOya, isTsumo) {
  const scorePoint = calculateScorePoints(totalHan, fu, isOya, isTsumo);
  
  // 送信中であることを画面上部に表示
  showResultView(`送信しています...<br>${yakuArray.join(", ")}<br>${totalHan}翻 ${fu}符`, "#ffc107", "#000");

  const matchRecord = {
    action: "recordMatch",
    matchData: ["A_20260708_01", "A", 1, 0, 0, (isTsumo ? "ツモ" : "ロン"), "自分", "対面", totalHan, scorePoint, ""],
    yakuData: yakuArray.map(yaku => ({ matchId: "A_20260708_01", winner: "自分", yaku: yaku }))
  };

  try {
    const response = await fetch(CONFIG_GAS_URL, {
      method: "POST",
      body: JSON.stringify(matchRecord)
    });
    const resultData = await response.json();

    if (resultData.result === "success") {
      // 成功したら緑色で結果を3秒間表示して消す
      showResultView(`【登録完了】<br>${totalHan}翻 ${fu}符<br><span style="font-size:24px;">${scorePoint}点</span>`, "#28a745", "#fff", 3000);
      log("スプレッドシートへの記録が完了しました。");
    } else {
      showResultView(`【登録エラー】`, "#dc3545", "#fff", 3000);
    }
  } catch (error) {
    showResultView(`【通信エラー】`, "#dc3545", "#fff", 3000);
  }
}

// 結果確認ビュー（画面上部）をコントロールする補助関数
function showResultView(htmlMessage, bgColor, textColor, hideAfterMs = null) {
  const view = document.getElementById('resultView');
  const textDiv = document.getElementById('resultText');
  
  textDiv.innerHTML = htmlMessage;
  view.style.background = bgColor;
  view.style.color = textColor;
  view.style.display = "block";
  
  if (hideAfterMs) {
    setTimeout(() => {
      view.style.display = "none";
    }, hideAfterMs);
  }
}

// ログ出力用補助関数（そのまま）
function log(message) {
  const logArea = document.getElementById('logArea');
  if(logArea) {
    logArea.innerHTML += message + "<br>";
    logArea.scrollTop = logArea.scrollHeight;
  }
}
window.onload = () => {
      loadDictionary();
};
</script>
</body>
</html>
