// アプリ起動時に最初に呼び出す関数（LIFF連動版）
const CONFIG_LIFF_ID = "2010600263-fW0rPubj"; 

async function initApp() {
  let myUserId = null;

  // 1. URLパラメータ（?userId=xxx）からID取得を試みる（PCテスト用）
  const urlParams = new URLSearchParams(window.location.search);
  myUserId = urlParams.get('userId');

  // 2. URLにIDがなく、LIFF IDが設定されている場合はLINEからIDを自動取得
  if (!myUserId && CONFIG_LIFF_ID && CONFIG_LIFF_ID !== "ここにあなたのLIFF_IDを入れてください") {
    try {
      // LIFFの初期化
      await liff.init({ liffId: CONFIG_LIFF_ID });
      
      // LINEアプリ内で開かれているかチェック
      if (liff.isLoggedIn()) {
        const profile = await liff.getProfile();
        myUserId = profile.userId; // LINEから本物のUserIDを自動取得！
      } else {
        // LINE外（普通のSafariやChrome等）で開かれた場合はログイン画面へ誘導
        liff.login();
        return;
      }
    } catch (err) {
      console.error("LIFFの初期化またはID取得に失敗しました:", err);
    }
  }

  // 3. それでもIDがない場合は、以前保存したキャッシュから探す
  if (!myUserId) {
    myUserId = localStorage.getItem('myUserId');
  } else {
    // IDが取得できたら次回のためにスマホに記憶させておく
    localStorage.setItem('myUserId', myUserId);
  }
  
  // 4. 最終的にIDが全く取得できない場合の安全処理
  if (!myUserId) {
    document.getElementById("lobbyStatus").innerHTML = "⚠️ ユーザーIDが取得できません。<br>LINEから開き直すか、URLの末尾に ?userId=GUEST_1 などを付けてください。";
    loadHostInterface();
    return;
  }
  
  document.getElementById("lobbyStatus").textContent = "⏳ 参加中の卓を確認しています...";
  
  try {
    // 自分が参加している「進行中の卓」があるかGASに問い合わせ
    const res = await fetch(`${CONFIG_GAS_URL}?action=getMyTable&userId=${myUserId}`);
    const resData = await res.json();
    
    if (resData.result === "success") {
      // ➡️ 卓が見つかった！自動着席してメイン画面を表示
      setupMahjongTableUI(resData.tableData, myUserId);
    } else {
      // ➡️ 卓がなかった！ホスト用の卓作成画面をロード
      document.getElementById("lobbyStatus").textContent = "現在、進行中の卓はありません。";
      loadHostInterface();
    }
  } catch (e) {
    document.getElementById("lobbyStatus").textContent = "⚠️ 通信エラーが発生しました。";
  }
}

// 自分の席（東・南・西・北）を基準にして、名前と点数をUIにハメ込む神ロジック
function setupMahjongTableUI(table, myUserId) {
  // 画面をロビーから対局画面に切り替える
  document.getElementById("lobbyView").style.display = "none";
  document.getElementById("mainGameView").style.display = "block";
  
  // 中央の局情報を更新
  document.getElementById("uiKyoku").textContent = table.kyoku;
  document.getElementById("uiHonba").textContent = table.honba + "本場";
  document.getElementById("uiKyotaku").textContent = "供託: " + table.kyotaku;

  // 絶対位置（東南西北）の並び順（反時計回り）
  const SEATS = ["東", "南", "西", "北"];
  
  // 各風の「名前」と「点数」のデータをオブジェクトでまとめる
  const seatData = {
    "東": { name: table.eastName, score: table.eastScore },
    "南": { name: table.southName, score: table.southScore },
    "西": { name: table.westName, score: table.westScore },
    "北": { name: table.northName, score: table.northScore }
  };

  // 自分の座席のインデックス（例：自分が「西」なら 2 ）
  let myIdx = SEATS.indexOf(table.mySeat);

  // 自分から見た相対位置（下家・対面・上家）のインデックスを計算
  let shimochaIdx = (myIdx + 1) % 4; // 自分の次の風
  let toimenIdx   = (myIdx + 2) % 4; // 自分の正面の風
  let kamichaIdx  = (myIdx + 3) % 4; // 自分の前の風

  let shimochaSeat = SEATS[shimochaIdx];
  let toimenSeat   = SEATS[toimenIdx];
  let kamichaSeat  = SEATS[kamichaIdx];

  // 1. 自分（下）のUIを更新
  updateBox("boxJibun", seatData[table.mySeat].name, seatData[table.mySeat].score);
  // 2. 下家（右）のUIを更新
  updateBox("boxShimocha", seatData[shimochaSeat].name, seatData[shimochaSeat].score);
  // 3. 对面（上）のUIを更新
  updateBox("boxToimen", seatData[toimenSeat].name, seatData[toimenSeat].score);
  // 4. 上家（左）のUIを更新
  updateBox("boxKamicha", seatData[kamichaSeat].name, seatData[kamichaSeat].score);
  
  log(`🀄 ${table.mySeat}家として自動着席しました（卓ID: ${table.tableId}）`);
}

// UIの文字を書き換える補助関数
function updateBox(elementId, name, score) {
  const box = document.getElementById(elementId);
  box.querySelector(".p-name").textContent = name;
  box.querySelector(".p-score").textContent = score.toLocaleString();
}

// --- ホスト用：メンバー名簿を読み込んでプルダウンを作る処理（ゲスト自動追加版）---
async function loadHostInterface() {
  document.getElementById("createTableArea").style.display = "block";
  try {
    const res = await fetch(`${CONFIG_GAS_URL}?action=getMembers`);
    const data = await res.json();
    if (data.result === "success") {
      const selects = [
        document.getElementById("selEast"), 
        document.getElementById("selSouth"), 
        document.getElementById("selWest"), 
        document.getElementById("selNorth")
      ];
      
      selects.forEach(sel => {
        sel.innerHTML = '<option value="">-- 選択してください --</option>';
        
        // ① 名簿シートに登録されている本物のメンバーをプルダウンに追加
        data.members.forEach(m => {
          let opt = document.createElement("option");
          opt.value = m.id; 
          opt.textContent = m.name;
          sel.appendChild(opt);
        });
        
        // ② 【今回追加】人数が足りない時やテスト用の「ゲスト枠」を自動で3人分追加
        for (let i = 1; i <= 3; i++) {
          let opt = document.createElement("option");
          opt.value = `GUEST_${i}`; 
          opt.textContent = `ゲスト${i} (テスト用)`;
          sel.appendChild(opt);
        }
      });
      
      // 卓作成ボタンのクリックイベント
      document.getElementById("btnCreateTable").onclick = createNewTable;
    }
  } catch(e) { 
    console.error("名簿の読み込み失敗", e); 
  }
}

// ホストが「対局開始」を押した時の処理
async function createNewTable() {
  const eId = document.getElementById("selEast").value;
  const sId = document.getElementById("selSouth").value;
  const wId = document.getElementById("selWest").value;
  const nId = document.getElementById("selNorth").value;
  
  if(!eId || !sId || !wId || !nId) { 
    alert("4人全員を選択してください！"); 
    return; 
  }
  
  document.getElementById("lobbyStatus").textContent = "⚡ 卓を作成中...";
  const url = `${CONFIG_GAS_URL}?action=createTable&pEast=${eId}&pSouth=${sId}&pWest=${wId}&pNorth=${nId}`;
  
  try {
    const res = await fetch(url);
    const data = await res.json();
    
    if(data.result === "success") {
      // 作成が成功したら、そのままアプリを再起動させて自動着席させる
      initApp();
    } 
    // ▼ 追加：ダブルブッキング時のエラーハンドリング
    else if (data.result === "error_busy") {
      alert("⚠️ 選択されたメンバーの中に、すでに別の進行中の卓に参加している人がいます。\n\n画面をリロードすると、自動的にその卓へ合流します。");
      document.getElementById("lobbyStatus").textContent = "画面をリロードしてください。";
    } 
    else {
      alert("卓の作成に失敗しました。");
    }
  } catch(e) {
    alert("通信エラーが発生しました。");
  }
}

// 1. 辞書データの読み込み（爆速キャッシュ機能付き）
async function loadDictionary() {
  const micBtn = document.getElementById('micBtn');
  
  // ▼ステップ1：スマホ内に保存された前回の辞書（キャッシュ）があれば、即座に読み込む
  const cachedDict = localStorage.getItem('mahjongDictionary');
  if (cachedDict) {
    dictionary = JSON.parse(cachedDict);
    if(micBtn) {
      micBtn.disabled = false;
      micBtn.textContent = "🎤 アガリ役を音声入力";
    }
    log("保存された辞書を読み込みました（高速起動）。裏で最新版を同期します...");
    initSpeechRecognition(); // すぐに使えるようにする
  }

  // ▼ステップ2：裏でGASと通信し、最新の辞書データをダウンロードする
  try {
    const response = await fetch(CONFIG_GAS_URL + "?action=getDictionary");
    const resultData = await response.json();

    if (resultData.result === "success") {
      dictionary = resultData.dictionary;
      // 最新の辞書をスマホ（ブラウザ）に保存する
      localStorage.setItem('mahjongDictionary', JSON.stringify(dictionary));
      
      if (!cachedDict) {
        // 初回起動時（キャッシュが無い時）は、ここでボタンを有効化する
        if(micBtn) {
          micBtn.disabled = false;
          micBtn.textContent = "🎤 アガリ役を音声入力";
        }
        log("初回辞書の読み込みが完了しました。");
        initSpeechRecognition();
      } else {
        log("最新の辞書データの同期が完了しました。");
      }
    } else {
      if (!cachedDict) log(`<span style="color:red;">【エラー】GASからエラーが返されました。</span>`);
    }
  } catch (error) {
    if (!cachedDict) {
      log(`<span style="color:red;">【通信エラー】辞書が取得できません。</span>`);
      if(micBtn) micBtn.textContent = "通信エラー";
    } else {
      log("<span style='color:orange;'>最新辞書の同期に失敗しましたが、保存された辞書で動作します。</span>");
    }
  }
}

// 2. 音声認識の初期化
function initSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return;

  const recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = false; 

  const micBtn = document.getElementById('micBtn');
  if(!micBtn) return;

  recognition.onstart = () => {
    micBtn.textContent = "⏹ 録音中...";
    micBtn.style.background = "#dc3545"; 
  };

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    processSpeech(transcript);
  };

  recognition.onend = () => {
    micBtn.textContent = "🎤 アガリ役を音声入力";
    micBtn.style.background = "#007bff";
  };

  micBtn.addEventListener('click', () => {
    recognition.start(); 
  });
}

// 3. テキストからの役抽出・変換・鳴きあり処理
function processSpeech(text) {
  let normalizedText = text.replace(/[\s ]+/g, "");
  log(`[音声認識(補正後)]: ${normalizedText}`);

  let extractedYaku = [];
  let isKuiseagari = false;
  let remainingText = normalizedText;

  if (remainingText.includes("鳴きあり") || remainingText.includes("なきあり")) {
    isKuiseagari = true;
    remainingText = remainingText.replace(/鳴きあり|なきあり/g, "");
  }

  const sortedKeys = Object.keys(dictionary).sort((a, b) => b.length - a.length);

  for (const key of sortedKeys) {
    if (remainingText.includes(key)) {
      let officialName = dictionary[key];
      if (officialName !== "除外") {
        let splitYaku = officialName.split(/[、，,\s]+/);
        extractedYaku.push(...splitYaku);
      }
      remainingText = remainingText.replace(new RegExp(key, 'g'), "");
    }
  }

  if (extractedYaku.includes("鳴きあり")) {
    isKuiseagari = true;
    extractedYaku = extractedYaku.filter(yaku => yaku !== "鳴きあり");
  }

  let unknownParts = remainingText.replace(/[、，,\s]+/g, "").trim();
  if (unknownParts.length === 1 && /^[ぁ-んァ-ヶ]$/.test(unknownParts)) unknownParts = "";
  
  if (unknownParts.length > 0) {
    log(`<span style="color:red;">【警告】未登録の言葉が含まれています: 「${unknownParts}」</span>`);
  }

  // ▼ 学習ロジック ▼
  if (isAddingMode) {
    // 【条件】未登録語句があり、かつ「今回の追加で抽出された役がちょうど1つ」である時のみ学習する
    // 「役を2つ以上登録した（抽出された）」場合は、ここを通過できないため学習されません。
    if (globalUnknownWord && extractedYaku.length === 1) {
      globalAddedYaku = extractedYaku[0];
      log("【自動学習】未登録語句を1つの役として学習しました。");
    } else {
      // 役が複数抽出された場合、またはそもそも役が抽出されなかった場合は保留シートへ
      if (globalUnknownWord) {
        sendToPendingSheet(globalUnknownWord, normalizedText);
        log("【保留】言い直しで複数の役が抽出されたため、自動学習をキャンセルし保留しました。");
      }
      globalAddedYaku = "";
    }
    
    globalYakuArray.push(...extractedYaku);
    if (isKuiseagari) globalIsKuiseagari = true;
    isAddingMode = false; 
    log("【追加処理】前回までの役と合体させました。");
  } else {
    globalYakuArray = extractedYaku;
    globalIsKuiseagari = isKuiseagari;
    
    if (unknownParts) {
      globalUnknownWord = unknownParts;
    } else {
      globalUnknownWord = "";
    }
    globalAddedYaku = ""; 
  }

  globalYakuArray = [...new Set(globalYakuArray)];
  globalYakuArray.sort((a, b) => {
    let indexA = YAKU_ORDER.indexOf(a);
    let indexB = YAKU_ORDER.indexOf(b);
    if (indexA === -1) indexA = 999;
    if (indexB === -1) indexB = 999;
    return indexA - indexB;
  });

  log(`[現在の役リスト]: ${globalYakuArray.join(", ")}`);
  
  let isTsumo = globalYakuArray.includes("ツモ") || globalYakuArray.includes("嶺上開花") || globalYakuArray.includes("海底撈月") || globalYakuArray.includes("天和") || globalYakuArray.includes("地和");
  
  calculateScore(globalYakuArray, globalIsKuiseagari, isTsumo, false);
}

// 4. 合計翻数の計算とルート分岐判定
function calculateScore(yakuArray, isKuiseagari, isTsumo, isOya) {
  log("【点数計算フェーズ開始】");

  let yakumanList = yakuArray.filter(yaku => YAKU_HAN[yaku] === 13);
  if (yakumanList.length > 0) {
    yakuArray = yakumanList; 
    globalYakuArray = yakumanList; 
    log(`<span style="color:#d32f2f; font-weight:bold;">【役満検知！】通常の役やドラをすべて無効化しました。</span>`);
  }

  let totalHan = 0;
  let hasPinfu = false;
  let hasChiitoitsu = false;
  let hasToitoiSanankou = false;
  let isKuiseagariApplied = false; 

  for (let yaku of yakuArray) {
    let han = YAKU_HAN[yaku] || 0; 
    
    if (isKuiseagari && KUISEAGARI_YAKU.includes(yaku)) {
      han -= 1;
      isKuiseagariApplied = true; 
    }
    totalHan += han;

    if (yaku === "平和") hasPinfu = true;
    if (yaku === "七対子") hasChiitoitsu = true;
    if (yaku === "対々和" || yaku === "三暗刻") hasToitoiSanankou = true;
  }

  log(`最終計算翻数: ${totalHan}翻`);

  if (totalHan > 0) {
    showConfirmPopup(totalHan, hasPinfu, hasChiitoitsu, hasToitoiSanankou, isTsumo, isOya, yakuArray, isKuiseagariApplied);
  } else {
    log("<span style='color:red;'>エラー: 有効な役が抽出できませんでした</span>");
  }
}

// 統合された確認・アクションポップアップ
// 統合された確認・アクションポップアップ
function showConfirmPopup(totalHan, hasPinfu, hasChiitoitsu, hasToitoiSanankou, isTsumo, isOya, yakuArray, isKuiseagariApplied) {
  const popup = document.getElementById('confirmPopup');
  const infoText = document.getElementById('confirmPopupInfo');
  const buttonsArea = document.getElementById('fuButtonsArea');
  const btnAutoSubmit = document.getElementById('btnAutoSubmit');
  
  buttonsArea.innerHTML = ""; 
  btnAutoSubmit.style.display = "none"; // 初期状態は非表示
  
  // ▼【今回の修正】役が認識できず、未登録語句がある場合の専用UI（やり直し・キャンセル）
  if (totalHan === 0 && globalUnknownWord) {
    infoText.innerHTML = `
      <span style="color:#dc3545; font-weight:bold; font-size:18px;">⚠️ 役を認識できません</span><br>
      <div style="margin:10px 0; padding:8px; background:#f8d7da; color:#721c24; border-radius:5px; font-size:14px;">
        未登録ワード: <b>「${globalUnknownWord}」</b>
      </div>
      <span style="font-size:13px; color:#666;">「やり直し」を押して、正しい役名を言い直してください。</span>
    `;

    // ① やり直しボタン（見た目は「やり直し」だが、裏の動きは「追加（学習）」）
    let btnRetryAsAdd = document.createElement("button");
    btnRetryAsAdd.innerHTML = "🎤 やり直し";
    btnRetryAsAdd.style.background = "#28a745"; 
    btnRetryAsAdd.style.color = "#fff";
    btnRetryAsAdd.style.border = "none";
    btnRetryAsAdd.style.padding = "10px 15px";
    btnRetryAsAdd.style.borderRadius = "5px";
    btnRetryAsAdd.style.fontSize = "16px";
    btnRetryAsAdd.style.cursor = "pointer";
    btnRetryAsAdd.style.flex = "1 1 45%";
    btnRetryAsAdd.onclick = () => {
      popup.style.display = "none";
      isAddingMode = true;  // 学習モードをON
      startVoiceInput();    // 音声認識を再スタート（※もし普段の関数名が違う場合は書き換えてください）
    };

    // ② キャンセルボタン（無限ループ回避）
    let btnCancel = document.createElement("button");
    btnCancel.innerHTML = "✖ キャンセル";
    btnCancel.style.background = "#6c757d"; 
    btnCancel.style.color = "#fff";
    btnCancel.style.border = "none";
    btnCancel.style.padding = "10px 15px";
    btnCancel.style.borderRadius = "5px";
    btnCancel.style.fontSize = "16px";
    btnCancel.style.cursor = "pointer";
    btnCancel.style.flex = "1 1 45%";
    btnCancel.onclick = () => {
      popup.style.display = "none";
      // 裏で持っていた未登録データなどをすべて白紙に戻す
      globalUnknownWord = "";
      isAddingMode = false;
      log("入力をキャンセルしました。");
    };

    // ボタンを横並びに配置
    buttonsArea.style.display = "flex";
    buttonsArea.style.gap = "10px";
    buttonsArea.appendChild(btnRetryAsAdd);
    buttonsArea.appendChild(btnCancel);
  } 
  // 通常の役が認識されている場合のUI（既存）
  else {
    let hanText = `${totalHan}翻`;
    if (isKuiseagariApplied) {
      hanText += `<span style="font-size:14px; color:#555;"> (食い下がり)</span>`;
    }
    
    infoText.innerHTML = `確定役: ${yakuArray.join(", ")}<br>計算翻数: <b style="color:#e91e63;">${hanText}</b>`;
    buttonsArea.style.display = "flex";
    buttonsArea.style.gap = "5px";
    
    // 自動計算可能な場合
    if (totalHan >= 5 || hasPinfu || hasChiitoitsu || totalHan === 4) {
      let autoFu = 30; 
      if (hasChiitoitsu) autoFu = 25;
      if (hasPinfu && isTsumo) autoFu = 20;

      btnAutoSubmit.style.display = "block";
      btnAutoSubmit.textContent = `このまま記録 (${autoFu}符)`;
      btnAutoSubmit.onclick = () => {
        sendMatchDataToGAS(globalYakuArray, totalHan, autoFu, isOya, isTsumo);
        popup.style.display = "none";
      };
    } 
    // 符計算が必要な場合
    else {
      let maxFu = 70;
      let defaultFu = 30;
      const max2KoutsuYaku = ["混全帯么九", "純全帯幺九", "三色同順", "一気通貫", "混全帯么九", "純全帯么九"];
      let hasMax2Koutsu = yakuArray.some(yaku => max2KoutsuYaku.includes(yaku));
      
      if (hasToitoiSanankou) { maxFu = 110; defaultFu = 40; } 
      else if (hasMax2Koutsu) { maxFu = 100; }

      let allFu = [30, 40, 50, 60, 70, 80, 90, 100, 110];
      let showFu = allFu.filter(f => f <= maxFu);
      
      let initialFuList = showFu.filter(f => [30, 40, 50, 60, 70].includes(f));
      let hiddenFuList = showFu.filter(f => f >= 80);

      const renderBtn = (fu) => {
          let btn = document.createElement("button");
          btn.textContent = fu + "符";
          if (fu === defaultFu) {
            btn.style.background = "#007bff"; btn.style.color = "#fff"; btn.style.border = "2px solid #0056b3";
            btn.textContent = `★ ${fu}符`;
          } else {
            btn.style.background = "#f8f9fa"; btn.style.color = "#333"; btn.style.border = "1px solid #ccc";
          }
          btn.style.padding = "10px 15px"; btn.style.borderRadius = "5px"; btn.style.fontSize = "16px";
          btn.style.cursor = "pointer"; btn.style.flex = "1 1 40%";
          btn.onclick = () => { sendMatchDataToGAS(globalYakuArray, totalHan, fu, isOya, isTsumo); popup.style.display = "none"; };
          return btn;
      };

      initialFuList.forEach(f => buttonsArea.appendChild(renderBtn(f)));

      if (hiddenFuList.length > 0) {
          let moreBtn = document.createElement("button");
          moreBtn.textContent = "+ もっと見る";
          moreBtn.style.background = "#6c757d"; moreBtn.style.color = "#fff";
          moreBtn.style.padding = "10px 15px"; moreBtn.style.borderRadius = "5px";
          moreBtn.style.flex = "1 1 40%";
          moreBtn.onclick = () => {
              moreBtn.remove();
              hiddenFuList.forEach(f => buttonsArea.appendChild(renderBtn(f)));
          };
          buttonsArea.appendChild(moreBtn);
      }
    }
  }

  popup.style.display = "flex";
}
  
function startAddVoice() {
  isAddingMode = true;
  document.getElementById('confirmPopup').style.display = "none";
  log("🎤 【追加】さらに役を発声してください...");
  document.getElementById('micBtn').click(); 
}

function startRetryVoice() {
  isAddingMode = false;
  globalYakuArray = []; 
  globalIsKuiseagari = false;
  
  globalUnknownWord = ""; 
  globalAddedYaku = "";   
  
  document.getElementById('confirmPopup').style.display = "none";
  log("🔄 【やり直し】もう一度すべての役を発声してください...");
  document.getElementById('micBtn').click(); 
}

// 5. アガリ打点の計算ロジック
function calculateScorePoints(han, fu, isOya, isTsumo) {
  let basePoint = 0;
  
  if (han >= 13) basePoint = 8000; 
  else if (han >= 11) basePoint = 6000; 
  else if (han >= 8) basePoint = 4000; 
  else if (han >= 6) basePoint = 3000; 
  else if (han >= 5 || (han === 4 && fu >= 30) || (han === 3 && fu >= 60)) basePoint = 2000; 
  else {
    basePoint = fu * Math.pow(2, han + 2);
    if (basePoint > 2000) basePoint = 2000; 
  }

  let totalScore = 0;
  let displayText = ""; 
  
  if (isTsumo) {
    if (isOya) {
      let koPay = Math.ceil((basePoint * 2) / 100) * 100;
      totalScore = koPay * 3;
      displayText = `${koPay}オール`; 
    } else {
      let oyaPay = Math.ceil((basePoint * 2) / 100) * 100;
      let koPay = Math.ceil((basePoint * 1) / 100) * 100;
      totalScore = oyaPay + (koPay * 2);
      displayText = `${koPay} / ${oyaPay}`; 
    }
  } else {
    if (isOya) {
      totalScore = Math.ceil((basePoint * 6) / 100) * 100;
    } else {
      totalScore = Math.ceil((basePoint * 4) / 100) * 100;
    }
    displayText = `${totalScore}点`; 
  }
  return { total: totalScore, text: displayText };
}

// 【今回追加】裏でこっそり辞書に自動登録する関数（不足分）
async function autoRegisterDictionary(raw, official) {
  try {
    const targetUrl = CONFIG_GAS_URL + "?action=addDictionary" 
      + "&rawText=" + encodeURIComponent(raw) 
      + "&officialText=" + encodeURIComponent(official);
    await fetch(targetUrl, { method: "GET" });
    log(`<span style="color:#06C755;">【自動学習完了】「${raw}」を「${official}」として辞書に登録しました。</span>`);
    dictionary[raw] = official; 
  } catch (error) {
    log(`<span style="color:red;">【自動学習エラー】辞書の登録に失敗しました。</span>`);
  }
}

// 6. GASへのデータ送信と結果表示
async function sendMatchDataToGAS(yakuArray, totalHan, fu, isOya, isTsumo) {
  if (globalUnknownWord && globalAddedYaku) {
    autoRegisterDictionary(globalUnknownWord, globalAddedYaku);
    globalUnknownWord = "";
    globalAddedYaku = "";
  }

  const scoreResult = calculateScorePoints(totalHan, fu, isOya, isTsumo);
  const scorePoint = scoreResult.total; 
  const scoreText = scoreResult.text;   
  
  showResultView(`送信しています...<br>${yakuArray.join(", ")}<br>${totalHan}翻 ${fu}符`, "#ffc107", "#000");

  const matchRecord = {
    action: "recordMatch",
    matchData: ["A_20260708_01", "A", 1, 0, 0, (isTsumo ? "ツモ" : "ロン"), "自分", "対面", totalHan, scorePoint, ""], 
    yakuData: yakuArray.map(yaku => ({ matchId: "A_20260708_01", winner: "自分", yaku: yaku }))
  };

  try {
    const response = await fetch(CONFIG_GAS_URL, {
      method: "POST",
      body: JSON.stringify(matchRecord)
    });
    const resultData = await response.json();

    if (resultData.result === "success") {
      showResultView(`【登録完了】<br>${totalHan}翻 ${fu}符<br><span style="font-size:24px;">${scoreText}</span>`, "#28a745", "#fff", 3000);
      log("スプレッドシートへの記録が完了しました。");
    } else {
      showResultView(`【登録エラー】`, "#dc3545", "#fff", 3000);
    }
  } catch (error) {
    showResultView(`【通信エラー】`, "#dc3545", "#fff", 3000);
  }
}

async function sendToPendingSheet(unknown, raw) {
  try {
    const targetUrl = CONFIG_GAS_URL + "?action=addPending" 
      + "&unknown=" + encodeURIComponent(unknown)
      + "&raw=" + encodeURIComponent(raw);
    await fetch(targetUrl, { method: "GET" });
    log("📝 未登録語句を保留シートに記録しました。後で確認してください。");
  } catch (e) {
    log("⚠️ 保留シートへの記録に失敗しました。");
  }
}

function showResultView(htmlMessage, bgColor, textColor, hideAfterMs = null) {
  const view = document.getElementById('resultView');
  const textDiv = document.getElementById('resultText');
  
  textDiv.innerHTML = htmlMessage;
  view.style.background = bgColor;
  view.style.color = textColor;
  view.style.display = "block";
  
  if (hideAfterMs) {
    setTimeout(() => {
      view.style.display = "none";
    }, hideAfterMs);
  }
}

function log(message) {
  const logArea = document.getElementById('logArea');
  if(logArea) {
    logArea.innerHTML += message + "<br>";
    logArea.scrollTop = logArea.scrollHeight;
  }
}
