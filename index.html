<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LINE ID確認</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
    #idBox { margin-top: 20px; padding: 15px; background: white; border-radius: 10px; font-weight: bold; word-break: break-all; }
    #sendBtn {
      display: none; margin-top: 30px; padding: 15px 30px; 
      background: #06C755; color: white; border-radius: 30px; 
      border: none; font-weight: bold; font-size: 16px; cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <h2>あなたのLINE ID</h2>
  <p>以下のボタンを押してシステムに登録してください。</p>
  
  <div id="idBox">IDを取得中...</div>
  
  <button id="sendBtn">指定のトークに送信する</button>

  <script>
    const myLiffId = "2010600263-dAcCU7j1"; 
    const gasUrl = "https://script.google.com/macros/s/AKfycbxApVeyJSrYaWtUDyttPUbUdvMgs3OknGQ5ZuLz9AhdJxrxa3S3KQsgQK1VUJ6z6kI/exec";

    window.onerror = function(message) {
      document.getElementById('idBox').textContent = "システムエラー: " + message;
    };

    async function initializeLiff() {
      try {
        await liff.init({ liffId: myLiffId });
        
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          const userId = profile.userId;
          document.getElementById('idBox').textContent = userId;
          
          const sendBtn = document.getElementById('sendBtn');
          sendBtn.style.display = 'inline-block';
          
          // 送信ボタンが押された時の処理
          sendBtn.addEventListener('click', async () => {
            sendBtn.textContent = "送信中...";
            sendBtn.disabled = true;
            
            try {
              // GASへデータを送信
              await fetch(gasUrl, {
                method: "POST",
                redirect: "follow", // GAS特有の転送に対応するための必須設定
                headers: { "Content-Type": "text/plain" }, // CORS回避用
                body: JSON.stringify({ userId: userId })
              });
              
              sendBtn.textContent = "送信完了";
              sendBtn.style.background = "#999";
            } catch (error) {
              alert("送信に失敗しました");
              sendBtn.textContent = "もう一度送信する";
              sendBtn.disabled = false;
            }
          });

        } else {
          document.getElementById('idBox').textContent = "エラー：LINEアプリ内で開いてください";
        }
      } catch (err) {
        document.getElementById('idBox').textContent = "初期化エラー: " + err.message;
      }
    }
    
    initializeLiff();
  </script>
</body>
</html>
