<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LINE ID確認</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
    #idBox { margin-top: 20px; padding: 15px; background: white; border-radius: 10px; font-weight: bold; word-break: break-all; }
    #sendBtn {
      display: none; margin-top: 30px; padding: 15px 30px; 
      background: #06C755; color: white; border-radius: 30px; 
      text-decoration: none; font-weight: bold; font-size: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <h2>あなたのLINE ID</h2>
  <p>以下のボタンから送信してください。</p>
  
  <div id="idBox">IDを取得中...</div>
  
  <!-- 送信ボタン（初期状態では非表示） -->
  <a id="sendBtn" href="#">LINEで送る</a>

  <script>
    // ▼ ここに「LIFF ID」の英数字部分だけを入力します
    const myLiffId = "2010600263-dAcCU7j1"; 

    window.onerror = function(message) {
      document.getElementById('idBox').textContent = "システムエラー: " + message;
    };

    async function initializeLiff() {
      try {
        await liff.init({ liffId: myLiffId });
        
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          const userId = profile.userId;
          document.getElementById('idBox').textContent = userId;
          
          // ID取得に成功したらボタンを表示し、送信URLをセットする
          const sendBtn = document.getElementById('sendBtn');
          sendBtn.href = `https://line.me/R/msg/text/?私のLINE IDはこれです！%0A${userId}`;
          sendBtn.style.display = 'inline-block';
        } else {
          document.getElementById('idBox').textContent = "エラー：LINEアプリ内で開いてください";
        }
      } catch (err) {
        document.getElementById('idBox').textContent = "初期化エラー: " + err.message;
      }
    }
    
    initializeLiff();
  </script>
</body>
</html>
